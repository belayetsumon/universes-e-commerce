<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section>
            <div class="d-flex align-items-center mb-4">
                <h2>Change User Password</h2>
                <nav aria-label="breadcrumb" class="align-middle">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/admin/index}">Home</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/users/index}">Users</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Change Password</li>
                    </ol>
                </nav>
            </div>
        </section>

        <div class="row">
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header">
                        <div class="row align-items-center">
                            <div class="col-sm-6">
                                <strong><i class="bi bi-shield-lock me-1"></i> Reset Password</strong>
                            </div>
                            <div class="col-sm-6 text-end">
                                <div class="btn-group">
                                    <a class="btn btn-outline-primary btn-sm" th:href="@{/users/view/{uid}(uid=${users.id})}">Profile View</a>
                                    <a class="btn btn-danger btn-sm" th:href="@{/users/index}">Close</a>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card-body">
                        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${success}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <div class="mb-4">
                            <div><strong>User:</strong> <span th:text="${users.firstName + (users.lastName != null and !#strings.isEmpty(users.lastName) ? ' ' + users.lastName : '')}">User Name</span></div>
                            <div><strong>Email:</strong> <span th:text="${users.email}">user@example.com</span></div>
                            <div><strong>Mobile:</strong> <span th:text="${users.mobile}">01700000000</span></div>
                        </div>

                        <form th:action="@{/users/change-password/{id}(id=${users.id})}" th:object="${passwordForm}" method="post" class="row g-3">
                            <div class="col-12">
                                <label class="form-label" for="newPassword">New Password</label>
                                <input id="newPassword" type="password" class="form-control" th:field="*{newPassword}" placeholder="Enter new password">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                            </div>

                            <div class="col-12">
                                <label class="form-label" for="confirmPassword">Confirm Password</label>
                                <input id="confirmPassword" type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Confirm new password">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-warning">
                                    <i class="bi bi-key me-1"></i> Update Password
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
