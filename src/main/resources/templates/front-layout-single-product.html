<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="keywords" th:content="${session.globalSettings.metaKeywords}" content="">
        <meta name="author" th:content="${session.globalSettings.siteName}" content="">
        <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}">
        <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}">
        <th:block th:replace="~{fronttheme/fragments/social-metadata :: metadata}"></th:block>
        <th:block th:replace="~{fronttheme/fragments/tracking :: head}"></th:block>

        <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.1/css/bootstrap.min.css}">
        <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css}">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/animate.css}">
        <link rel="stylesheet" th:href="@{/css/hover-min.css}">
        <link rel="stylesheet" th:href="@{/assets/front/css/front-site.css}">
        <link rel="icon" th:if="${session.globalSettings.favicon != null}" th:href="@{${session.globalSettings.favicon}}">
        <th:block layout:fragment="page_css"></th:block>
    </head>
    <body class="front-app front-site-layout front-single-product-layout">
        <th:block th:replace="~{fronttheme/fragments/tracking :: body-noscript}"></th:block>
        <header>
            <div th:replace="~{front-header}"></div>
        </header>
        <main layout:fragment="main_content">Product content</main>
        <footer>
            <div th:replace="~{front-footer}"></div>
        </footer>
        <script th:src="@{/js/jquery-3.2.1.slim.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/5.3.1/js/bootstrap.bundle.min.js}"></script>
        <script th:src="@{/webjars/htmx.org/1.9.5/dist/htmx.min.js}" defer></script>
        <script th:src="@{/assets/front/js/front-site.js}"></script>
        <script th:src="@{/assets/front/js/app-tracking.js}" defer></script>
        <th:block layout:fragment="page_js"></th:block>
    </body>
</html>
