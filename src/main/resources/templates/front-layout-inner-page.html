<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <meta name="" content="" />

        <meta name="description" th:content="${pageDescription != null ? pageDescription : session.globalSettings.metaDescription}" content="">
        <meta name="keywords" th:content="${session.globalSettings.metaKeywords}" content="">
        <meta name="author" th:content="${session.globalSettings.siteName}" content="">

        <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.1/css/bootstrap.min.css}">
        <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css}">

        <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

        <!--  Font Awsome  -->
        <link rel="stylesheet" href="/webjars/font-awesome/6.5.1/css/all.min.css">
        <!-- FancyBox CSS -->
        <!--        <link rel="stylesheet" th:href="@{/webjars/fancyapps__fancybox/dist/jquery.fancybox.min.css}" />-->

        <!-- wol carousel -->
        <!--        <link rel="stylesheet" th:href="@{/plugin/owlcarousel/assets/owl.carousel.min.css}">
                <link rel="stylesheet" th:href="@{/plugin/owlcarousel/assets/owl.theme.green.min.css}">-->

        <!--        animate.min.css-->

        <!-- Slick CSS -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css"/>

        <link rel="stylesheet" th:href="@{/css/animate.css}">

        <!--        Hover css-->
        <link rel="stylesheet" th:href="@{/css/hover-min.css}">
        <link rel="stylesheet" th:href="@{/assets/front/css/front-site.css}"/>
        <link rel="icon" th:if="${session.globalSettings.favicon != null}" th:href="@{${session.globalSettings.favicon}}">
    <th:block layout:fragment="page_css"></th:block>
    <noscript><img height="1" width="1" class="facebook-pixel-fallback"
                   src="https://www.facebook.com/tr?id=1365852474985195&ev=PageView&noscript=1"
                   /></noscript>
    <!-- End Meta Pixel Code -->

    <title th:text="${pageTitle != null ? pageTitle : (session.globalSettings.siteTitle != null ? session.globalSettings.siteTitle : session.globalSettings.siteName)}">Musapir</title>
</head>
<body class="front-app front-site-layout">
    <div class="site-loading-overlay" data-site-loader role="status" aria-live="polite" aria-label="Loading page">
        <div class="site-loading-panel">
            <div class="site-loading-brand">
                <span class="site-loading-mark"><i class="bi bi-bag-check"></i></span>
                <span th:text="${session.globalSettings.siteName != null ? session.globalSettings.siteName : 'Universes Ecommerce'}">Universes Ecommerce</span>
            </div>
            <div class="site-loading-progress" aria-hidden="true">
                <span data-site-loader-bar></span>
            </div>
            <div class="site-loading-meta">
                <strong data-site-loader-percent>0%</strong>
                <span data-site-loader-time>0.0s</span>
            </div>
        </div>
    </div>
    <header>
        <!-- Site wrapper -->
        <div th:replace="~{front-header}">

            <!-- Header  -->

        </div>
        <!-- =============================================== -->
    </header>
    <section> <!-- main -->
        <div layout:fragment="main_content">main Content</div>


    </section>
    <div class="row ma"></div>
    <!-- /.content-wrapper -->

    <footer>

        <div  th:replace="~{front-footer}">
            footer
        </div>
    </footer>


    <script th:src="@{/js/jquery-3.2.1.slim.min.js}"></script>

    <!-- Bootstrap -->
    <!--        <script th:src="@{/bootstrap-5.2.3-dist/js/bootstrap.bundle.min.js}"></script>-->
    <script th:src="@{/webjars/bootstrap/5.3.1/js/bootstrap.bundle.min.js}"></script>

    <script th:src="@{/webjars/htmx.org/1.9.5/dist/htmx.min.js}" defer></script>

    <!--owlcarousel-->

    <!--    <script th:src="@{/plugin/owlcarousel/owl.carousel.min.js}"></script>-->

    <script type="text/javascript" src="//cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

    <script th:src="@{/assets/front/js/front-site.js}"></script>
<th:block layout:fragment="page_js"></th:block>

</body>
</html>
