<!doctype html>
<html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta name="description" th:content="${pageDescription != null ? pageDescription : session.globalSettings.metaDescription}" content="">
        <meta name="keywords" th:content="${session.globalSettings.metaKeywords}" content="">
        <meta name="author" th:content="${session.globalSettings.siteName}" content="Engr.Md Belayet Hossain Sumon">

        <link rel="stylesheet" href="/webjars/bootstrap/5.3.1/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.css">
        <link rel="stylesheet" href="/webjars/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
        <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.jqueryui.min.css" >
        <!-- DataTables Buttons CSS -->
        <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.3.6/css/buttons.dataTables.min.css"/>
        <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.bootstrap5.css"/>
        <link rel="stylesheet" th:href="@{/css/filepond.min.css}"/>
        <link rel="stylesheet" th:href="@{/assets/vendor/css/vendor-panel.css}"/>
        <link rel="icon" th:if="${session.globalSettings.favicon != null}" th:href="@{${session.globalSettings.favicon}}">
    <th:block layout:fragment="page_css"></th:block>


    <title th:text="${pageTitle != null ? pageTitle : (session.globalSettings.siteTitle != null ? session.globalSettings.siteTitle : session.globalSettings.siteName)}">Universal e-Commerce Platform</title>
</head>
<body class="">
    <section>
        <div th:replace="~{vendor-header :: vendorHeader}">
            Vendor Header
        </div>
    </section>


    <section class=" py-3">
        <div class="container-fluid">
            <div class="row g-4 align-items-start vendor-shell__row">

                <aside class="col-12 col-lg-3 col-xl-2">
                    <div class="vendor-shell__sidebar">
                        <div th:replace="vendor-left-menu">
                            Left side column. contains the sidebar

                            Left Side
                            ===============================================
                        </div>
                    </div>
                </aside>

                <!-- Content Wrapper. Contains page content -->
                <div class="col-12 col-lg-9 col-xl-10">
                    <div class="vendor-shell__content" layout:fragment="main_content">
                        <div  th:replace="admin_content">
                        </div>
                    </div>
                </div>


            </div>
        </div>
        <!-- /.content-wrapper -->
    </section>



    <div class="row ma"></div>



    <div  th:replace="~{vendor-footer}">
        footer
    </div>


    <!-- Optional JavaScript -->
    <!-- jQuery first, then Popper.js, then Bootstrap JS -->
    <script src="/webjars/jquery/3.7.0/jquery.min.js"></script>
    <script src="/webjars/bootstrap/5.3.1/js/bootstrap.bundle.min.js"></script>
    <script src="/webjars/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>

    <!-- HTMX WebJar Script -->
    <script th:src="@{/webjars/htmx.org/1.9.5/dist/htmx.min.js}" defer></script>

    <script src="/webjars/tinymce/7.2.1/tinymce.min.js"></script>

    <!--        <script src="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.9.0/dist/js/bootstrap-datepicker.min.js"></script>-->

    <!--        <script src="/webjars/datatables/2.0.3/js/jquery.dataTables.min.js"></script>-->
    <!--        <script src="/webjars/momentjs/2.29.1/moment.min.js"></script>-->
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.3.6/js/dataTables.buttons.min.js"></script>
    <!-- JSZip for Excel export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
    <!-- pdfmake for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.68/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.68/vfs_fonts.js"></script>
    <!-- DataTables Buttons HTML5 export JS -->
    <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.html5.min.js"></script>
    <!-- DataTables Buttons Print JS -->
    <script src="https://cdn.datatables.net/buttons/2.3.6/js/buttons.print.min.js"></script>
    <script th:src="@{/js/filepond.min.js}"></script>
    <script src="https://unpkg.com/filepond-plugin-file-validate-type/dist/filepond-plugin-file-validate-type.js"></script>
    <script src="https://unpkg.com/filepond-plugin-file-validate-size/dist/filepond-plugin-file-validate-size.js"></script>
    <script th:src="@{/assets/vendor/js/vendor-panel.js}"></script>
<th:block layout:fragment="page_js"></th:block>
</body>


</html>
