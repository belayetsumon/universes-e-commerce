<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-vendor-page">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center alert alert-secondary">
                <h4 th:text="${pageTitle}"></h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#" class="nav-link"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/vendor/stock/transactions}" class="nav-link">Stock Transactions</a></li>
                        <li class="breadcrumb-item active" aria-current="page" th:text="${pageTitle}"></li>
                    </ol>
                </nav>
            </div>
        </section>

        <div th:if="${not #strings.isEmpty(errorMessage)}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong th:text="${pageTitle}"></strong>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/vendor/stock/transactions}">Back</a>
            </div>
            <div class="card-body">
                <form th:action="@{${stockAction}}" method="post">
                    <!--                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

                    <div class="mb-3">
                        <label class="form-label">Product</label>
                        <select id="productId" name="productId" class="form-select" required>
                            <option value="">-- Select Product --</option>
                            <option th:each="product : ${products}" th:value="${product.id}" th:text="${product.title}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Catalog Variant (Optional)</label>
                        <select id="catalogVariantUuid" name="catalogVariantUuid" class="form-select">
                            <option value="">-- Product Level Stock --</option>
                            <option th:each="variant : ${catalogVariants}"
                                    th:value="${variant.uuid}"
                                    th:attr="data-product-id=${variant.product.id}"
                                    th:text="${variant.product.title + ' | SKU: ' + variant.sku}">
                            </option>
                        </select>
                        <div class="form-text">Leave blank to update product-level stock, or choose a catalog variant for variant-level inventory.</div>
                    </div>

                    <div class="mb-3" th:if="${stockMode == 'RECEIVE'}">
                        <label class="form-label">Quantity</label>
                        <input type="number" step="0.001" min="0.001" name="quantity" class="form-control" required>
                    </div>

                    <div class="mb-3" th:if="${stockMode == 'ADJUST'}">
                        <label class="form-label">Quantity Delta</label>
                        <input type="number" step="0.001" name="quantityDelta" class="form-control" required>
                        <div class="form-text">Use positive value to add stock and negative value to reduce stock.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Note</label>
                        <textarea name="note" class="form-control" rows="3" placeholder="Optional adjustment note"></textarea>
                    </div>

                    <button type="submit" class="btn btn-success" th:text="${pageTitle}"></button>
                </form>
            </div>
        </div>

        <script th:inline="javascript">
            // 2026-05-15: Keep catalog variant selection aligned with the chosen product.
            document.addEventListener('DOMContentLoaded', function () {
                const productSelect = document.getElementById('productId');
                const catalogVariantSelect = document.getElementById('catalogVariantUuid');
                if (!productSelect || !catalogVariantSelect) {
                    return;
                }

                const filterCatalogVariants = function () {
                    const selectedProductId = productSelect.value;
                    Array.from(catalogVariantSelect.options).forEach(function (option, index) {
                        if (index === 0) {
                            option.hidden = false;
                            return;
                        }
                        const productId = option.getAttribute('data-product-id');
                        option.hidden = selectedProductId !== '' && productId !== selectedProductId;
                    });
                    if (catalogVariantSelect.selectedOptions.length > 0 && catalogVariantSelect.selectedOptions[0].hidden) {
                        catalogVariantSelect.value = '';
                    }
                };

                productSelect.addEventListener('change', filterCatalogVariants);
                filterCatalogVariants();
            });
        </script>
    </div>
</div>
