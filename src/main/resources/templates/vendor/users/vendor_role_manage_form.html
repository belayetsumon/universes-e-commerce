<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-vendor-page">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h4><i class="bi bi-shield-check me-2 text-primary"></i>Vendor Custom Role</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#" class="nav-link"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Role Form</li>
                    </ol>
                </nav>
            </div>
        </section>

        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-0" th:text="${vendorRole.id != null} ? 'Edit Custom Role' : 'Create Custom Role'"></h5>
                    <small class="text-muted" th:text="${companyName}"></small>
                </div>
                <a th:href="@{/vendor-users/roles}" class="btn btn-danger btn-sm">
                    <i class="bi bi-x-circle"></i> Close
                </a>
            </div>

            <div class="card-body">
                <form th:action="@{/vendor-users/roles/save}" th:object="${vendorRole}" method="post">
                    <input type="hidden" th:field="*{id}" />

                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Role Name</label>
                        <input id="name" type="text" th:field="*{name}" class="form-control" placeholder="e.g. Content Editor" required />
                        <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>

                    <div class="mb-3">
                        <label for="slug" class="form-label fw-semibold">Role Slug</label>
                        <input id="slug" type="text" th:field="*{slug}" class="form-control" placeholder="e.g. content_editor" required />
                        <div class="text-danger" th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Privileges</label>
                        <div class="row row-cols-1 row-cols-md-2 g-2">
                            <div th:each="privilege : ${allPrivileges}" class="col">
                                <div class="form-check border rounded p-2 h-100">
                                    <input class="form-check-input"
                                           type="checkbox"
                                           th:value="${privilege.id}"
                                           th:name="vendorPrivilege"
                                           th:id="'privilege__' + ${privilege.id}"
                                           th:checked="${vendorRole.vendorPrivilege != null and vendorRole.vendorPrivilege.contains(privilege)}" />
                                    <label class="form-check-label" th:for="'privilege__' + ${privilege.id}">
                                        <span class="fw-semibold" th:text="${privilege.name}"></span>
                                        <br />
                                        <small class="text-muted" th:text="${privilege.slug}"></small>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle me-1"></i> Save Role
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
