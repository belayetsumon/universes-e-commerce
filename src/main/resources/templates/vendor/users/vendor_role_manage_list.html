<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-vendor-page">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h4><i class="bi bi-shield-check me-2 text-primary"></i>Vendor Role Management</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#" class="nav-link"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Custom Role List</li>
                    </ol>
                </nav>
            </div>
        </section>

        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-0">[[${companyName}]] Roles</h5>
                    <small class="text-muted">Total custom roles: [[${roles.size()}]]</small>
                </div>
                <div class="btn-group">
                    <a class="btn btn-success btn-sm" th:href="@{/vendor-users/roles/add}">
                        <i class="bi bi-plus-circle"></i> Add Role
                    </a>
                    <a class="btn btn-danger btn-sm" th:href="@{/vendor-users/userlist}">
                        <i class="bi bi-x-circle"></i> Close
                    </a>
                </div>
            </div>

            <div class="card-body">
                <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${message}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="table-responsive">
                    <table class="table table-bordered table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Slug</th>
                                <th>Privileges</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="role : ${roles}">
                                <td th:text="${role.name}"></td>
                                <td th:text="${role.slug}"></td>
                                <td>
                                    <span th:if="${#lists.isEmpty(role.vendorPrivilege)}" class="text-muted">No privileges selected</span>
                                    <ul class="mb-0 ps-3" th:if="${not #lists.isEmpty(role.vendorPrivilege)}">
                                        <li th:each="privilege : ${role.vendorPrivilege}" th:text="${privilege.name}"></li>
                                    </ul>
                                </td>
                                <td>
                                    <a th:href="@{/vendor-users/roles/edit/{id}(id=${role.id})}" class="btn btn-warning btn-sm">
                                        <i class="bi bi-pencil-square"></i> Edit
                                    </a>
                                    <a th:href="@{/vendor-users/roles/delete/{id}(id=${role.id})}"
                                       class="btn btn-danger btn-sm"
                                       onclick="return confirm('Delete this custom role?');">
                                        <i class="bi bi-trash"></i> Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="alert alert-info mb-0" th:if="${#lists.isEmpty(roles)}">
                    No custom roles found yet. Add roles like Content Editor or Shipping Manager for your team.
                </div>
            </div>
        </div>
    </div>
</div>
