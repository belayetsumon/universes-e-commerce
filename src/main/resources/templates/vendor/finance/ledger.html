<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-vendor-page">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center alert alert-secondary">
                <h4>Vendor Finance Ledger</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#" class="nav-link"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Ledger</li>
                    </ol>
                </nav>
            </div>
        </section>

        <div th:if="${not #strings.isEmpty(errorMessage)}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong th:text="${vendorprofile != null ? vendorprofile.companyName + ' Ledger' : 'Vendor Ledger'}"></strong>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/vendor/finance/dashboard}">Back Dashboard</a>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-bordered table-hover table-striped">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Order</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Credit</th>
                            <th>Debit</th>
                            <th>Running Balance</th>
                            <th>Description</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(ledgerRows)}">
                            <td colspan="9" class="text-center">No vendor ledger history found.</td>
                        </tr>
                        <tr th:each="row, status : ${ledgerRows}">
                            <td th:text="${status.count}"></td>
                            <td th:text="${row.transaction.created}"></td>
                            <td th:text="${row.transaction.salesOrder != null ? row.transaction.salesOrder.orderCode : '-'}"></td>
                            <td th:text="${row.transaction.transactionType}"></td>
                            <td th:text="${row.transaction.status}"></td>
                            <td th:text="${row.credit}"></td>
                            <td th:text="${row.debit}"></td>
                            <td th:text="${row.runningBalance}"></td>
                            <td th:text="${row.transaction.description}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
