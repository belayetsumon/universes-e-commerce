<!-- vendor/balance.html -->
<h3>Vendor Balance</h3>
<p>Pending Amount: [[${balance.pending}]]</p>
<p>Available Balance: [[${balance.available}]]</p>
<p>Total Paid: [[${balance.paid}]]</p>

<form th:action="@{/vendor-payout/request-payout}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <label>Payment Method:</label>
    <select name="method">
        <option value="BANK">Bank</option>
        <option value="BKASH">bKash</option>
    </select>
    <button type="submit">Request Payout</button>
</form>

<p th:if="${successMessage}" class="text-success">[[${successMessage}]]</p>
<p th:if="${errorMessage}" class="text-danger">[[${errorMessage}]]</p>
