<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-vendor-page">
    <div layout:fragment="main_content">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <div>
                <h4 class="mb-1">Create Manifest</h4>
                <p class="text-muted mb-0">Select prepared shipments for carrier or delivery-person handover.</p>
            </div>
            <a th:href="@{/vendor/shipping-documents/manifests}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/vendor/shipping-documents/manifests/save}" method="post" class="row g-3">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="col-md-6">
                        <label class="form-label">Carrier</label>
                        <select name="carrierId" class="form-select">
                            <option value="">No carrier selected</option>
                            <option th:each="carrier : ${carriers}" th:value="${carrier.id}" th:text="${carrier.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-6 d-flex align-items-end">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="closed" value="true" id="closed">
                            <label class="form-check-label" for="closed">Mark as handed over now</label>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Shipments</label>
                        <select name="shipmentIds" class="form-select" multiple size="12" required>
                            <option th:each="s : ${shipments}"
                                    th:value="${s.id}"
                                    th:text="${'Shipment #' + s.id + ' / Order ' + s.salesOrderId + ' / ' + s.status + ' / ' + (s.trackingNumber != null ? s.trackingNumber : 'No tracking')}"></option>
                        </select>
                        <small class="text-muted">Use Ctrl or Shift to select multiple shipments.</small>
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-clipboard-check"></i> Save Manifest
                        </button>
                        <a th:href="@{/vendor/shipping-documents/manifests}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
