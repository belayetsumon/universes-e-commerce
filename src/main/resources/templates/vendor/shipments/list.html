<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>My Shipments</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    </head>
    <body>
        <div class="container mt-4">
            <h2>My Shipments</h2>
            <a href="/vendor/shipments/new" class="btn btn-success mb-3">+ Create Shipment</a>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>ID</th><th>Order ID</th><th>Carrier</th><th>Tracking</th><th>Status</th><th>Cost</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="s : ${shipments}">
                        <td th:text="${s.id}"></td>
                        <td th:text="${s.salesOrderId}"></td>
                        <td th:text="${s.carrier != null ? s.carrier.name : ''}"></td>
                        <td th:text="${s.trackingNumber}"></td>
                        <td th:text="${s.status}"></td>
                        <td th:text="${s.shippingCost}"></td>
                        <td>
                            <a th:href="@{'/vendor/shipments/edit/' + ${s.id}}" class="btn btn-sm btn-primary">Edit</a>
                            <a th:href="@{'/vendor/shipments/delete/' + ${s.id}}" class="btn btn-sm btn-danger">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </body>
</html>
