<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-vendor-page">
    <div layout:fragment="main_content">
        <section class="py-3">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="bi bi-image"></i> Vendor Logo</h5>
                </div>
                <div class="card-body">
                    <div class="alert alert-success" th:if="${message != null and messageType == 'success'}" th:text="${message}"></div>
                    <div class="alert alert-danger" th:if="${message != null and messageType == 'danger'}" th:text="${message}"></div>
                    <div class="alert alert-warning" th:if="${message != null and messageType == 'warning'}" th:text="${message}"></div>

                    <div th:if="${vendorprofile == null}">
                        <p class="mb-3">Create your vendor profile before uploading a logo.</p>
                        <a class="btn btn-primary" th:href="@{/vendorprofile/create}">Create Vendor Profile</a>
                    </div>

                    <div th:if="${vendorprofile != null}">
                        <div class="row g-4 align-items-start">
                            <div class="col-md-5">
                                <div class="border rounded p-3 text-center h-100">
                                    <h6 class="mb-3">Current Logo</h6>
                                    <div th:if="${vendorprofile.vendorLogo != null and !#strings.isEmpty(vendorprofile.vendorLogo)}">
                                        <img class="img-fluid img-thumbnail" th:src="@{/files/}+${vendorprofile.vendorLogo}" alt="Vendor logo"
                                             style="max-width: 260px; max-height: 260px; object-fit: contain;" />
                                    </div>
                                    <p class="text-muted mb-0" th:if="${vendorprofile.vendorLogo == null or #strings.isEmpty(vendorprofile.vendorLogo)}">
                                        No logo uploaded yet.
                                    </p>
                                </div>
                            </div>

                            <div class="col-md-7">
                                <form th:action="@{/vendorlogo/save}" enctype="multipart/form-data" method="post">
                                    <div class="mb-3">
                                        <label class="form-label" for="logoFile">Upload Vendor Logo</label>
                                        <input class="form-control" id="logoFile" name="logoFile" type="file" accept="image/*" required />
                                        <small class="form-text text-muted">Recommended image size: 300px x 300px.</small>
                                    </div>
                                    <div class="d-flex gap-2 flex-wrap">
                                        <button type="submit" class="btn btn-primary">Upload Logo</button>
                                        <a class="btn btn-outline-secondary" th:href="@{/vendorprofile/details}">Back To Profile</a>
                                    </div>
                                </form>
                                <form th:if="${vendorprofile.vendorLogo != null and !#strings.isEmpty(vendorprofile.vendorLogo)}"
                                      th:action="@{/vendorlogo/delete}" method="post" class="mt-3">
                                    <button type="submit" class="btn btn-outline-danger">Delete Current Logo</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
