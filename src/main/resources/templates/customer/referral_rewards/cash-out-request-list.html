<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-customar-page">

    <div layout:fragment = "main_content">
        <section>
            <div class="row">
                <div class="col-sm-3"><h4> Referral Rewards </h4></div>
                <div class="col-sm-5">   <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="nav-link">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Referral Rewards</li>
                            <li class="breadcrumb-item active" aria-current="page">Cash Out Request List</li>
                        </ol>
                    </nav>
                </div></div>
        </section>
        <hr/>
        <div class="row">
            <div class="col-sm-9">

                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-sm-5 font-weight-bold "><strong> <i class="bi bi-list-task"></i> Cash Out Request List</strong> </div>

                            <div class="col-sm-7 text-end">
                                <!--                                <div class="btn-group ">
                                                                    <a class="btn btn-success btn-sm " th:href="@{/product/create}"> <i class="bi bi-plus-circle"></i> Add Product </a>
                                                                    <a th:href="@{/admin/index}" type="button" class="btn  btn-danger btn-sm"> <i class="bi bi-x-circle"></i> Close</a>
                                                                </div>-->
                            </div>

                        </div>
                    </div>

                    <div class="card-body table-responsive">
                        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                        <div class="mb-3 text-end">
                            <a class="btn btn-primary btn-sm" th:href="@{/customerwallet/wallet/cashout}">
                                New Cash Out Request
                            </a>
                        </div>

                        <table id="example" class="table table-bordered table-hover table-striped">
                            <thead class="thead-light">
                                <tr>
                                    <th>#</th>
                                    <th>Payout Amount</th>
                                    <th>Payment Method</th>
                                    <th>Status</th>
                                    <th>Requested At</th>
                                    <th>Processed At</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${#lists.isEmpty(requests)}">
                                    <td colspan="6" class="text-center">No cash out requests found.</td>
                                </tr>
                                <tr th:each="request, status : ${requests}">
                                    <td th:text="${status.count}">1</td>
                                    <td th:text="${request.amount}">0</td>
                                    <td th:text="${request.paymentMethod}">MOBILE</td>
                                    <td th:text="${request.status}">PENDING</td>
                                    <td th:text="${request.requestedAt}">2026-01-01T10:00</td>
                                    <td th:text="${request.processedAt != null ? request.processedAt : '-'}">-</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>




                </div><!--  Card  end-->


            </div><!--  Main Content  end-->
            <div class="col-sm-3">

                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-sm-5 font-weight-bold ">  <strong><i class="fas fa-list"></i> Filter</strong> </div>



                        </div>
                    </div>
                    <div class="card-body">



                    </div><!--  Card body end-->


                </div><!--  Card  end-->


            </div>
        </div>   <!--  Layout end-->      </div><!--  Main Content  end-->
</div>
