<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="customer-layout">
    <div layout:fragment="main_content">
        <section>
            <div class="row">
                <div class="col-sm-6"><h4>My Gift Cards</h4></div>
            </div>
        </section>
        <hr/>

        <div class="card">
            <div class="card-header">
                <strong><i class="bi bi-gift"></i> Gift Card List</strong>
            </div>
            <div class="card-body table-responsive">
                <table class="table table-bordered table-hover table-striped">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Code</th>
                            <th>Initial</th>
                            <th>Balance</th>
                            <th>Status</th>
                            <th>Redeemed</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="gc,status:${giftCards}">
                            <td th:text="${status.count}">1</td>
                            <td><span class="badge bg-primary" th:text="${gc.code}">CODE</span></td>
                            <td th:text="${gc.initialValue}">0</td>
                            <td th:text="${gc.balance}">0</td>
                            <td th:text="${gc.status}">ACTIVE</td>
                            <td th:text="${gc.redeemed}">false</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
