<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="front-layout-inner-customar-page">
    <div layout:fragment="main_content">
        <section class="customer-blog-page">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h1 class="h4 mb-1"><i class="bi bi-bookmark-heart text-danger me-2"></i>Saved Blog Articles</h1>
                    <p class="text-muted mb-0">Your personal blog reading list.</p>
                </div>
                <a class="btn btn-outline-secondary" th:href="@{/customer/blog}">Browse Articles</a>
            </div>
            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card border-0 shadow-sm">
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>Article</th><th>Category</th><th>Saved</th><th class="text-end">Action</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="bookmark : ${savedArticles}" th:if="${bookmark.blog != null}">
                                <td>
                                    <a class="fw-semibold text-decoration-none" th:href="@{/customer/blog/{slug}(slug=${bookmark.blog.slug})}" th:text="${bookmark.blog.title}">Article</a>
                                    <div class="small text-muted" th:text="${bookmark.blog.excerpt}">Excerpt</div>
                                </td>
                                <td th:text="${bookmark.blog.category != null ? bookmark.blog.category.name : '-'}">-</td>
                                <td th:text="${bookmark.createdAt}">-</td>
                                <td class="text-end">
                                    <form method="post" th:action="@{/customer/blog/{slug}/bookmark/remove(slug=${bookmark.blog.slug})}">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-outline-danger">Remove</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(savedArticles)}"><td colspan="4" class="text-center text-muted py-5">No saved articles yet.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>
</div>
