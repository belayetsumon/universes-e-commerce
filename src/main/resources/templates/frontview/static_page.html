<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="front-layout-inner-page">

    <th:block layout:fragment="page_css">
        <style>
            .public-static-hero {
                background:
                    radial-gradient(circle at top right, rgba(255, 255, 255, 0.18), transparent 32%),
                    linear-gradient(135deg, #0f2746 0%, #184a75 48%, #0d7a7d 100%);
                color: #fff;
                padding: 52px 0;
            }

            .public-static-eyebrow {
                display: inline-block;
                padding: 0.45rem 0.8rem;
                border-radius: 999px;
                background: rgba(255, 255, 255, 0.14);
                font-size: 0.82rem;
                font-weight: 600;
                letter-spacing: 0.08em;
                text-transform: uppercase;
            }

            .public-static-hero h1 {
                margin: 1rem 0 0.8rem;
                font-size: clamp(2rem, 4vw, 3rem);
                font-weight: 700;
            }

            .public-static-hero p {
                margin: 0;
                max-width: 720px;
                color: rgba(255, 255, 255, 0.88);
                font-size: 1.02rem;
            }

            .public-static-breadcrumb {
                color: rgba(255, 255, 255, 0.78);
                font-size: 0.95rem;
                white-space: nowrap;
            }

            .public-static-breadcrumb a {
                color: #fff;
                text-decoration: none;
            }

            .public-static-page {
                background: linear-gradient(180deg, #f3f6fa 0%, #ffffff 100%);
                padding: 3rem 0 4rem;
            }

            .public-static-panel {
                height: 100%;
                padding: 1.65rem;
                border: 1px solid rgba(15, 39, 70, 0.08);
                border-radius: 24px;
                background: #fff;
                box-shadow: 0 18px 45px rgba(15, 39, 70, 0.08);
            }

            .public-static-panel h3 {
                margin-bottom: 1rem;
                color: #12304f;
                font-size: 1.15rem;
                font-weight: 700;
            }

            .public-static-section + .public-static-section {
                margin-top: 2rem;
                padding-top: 2rem;
                border-top: 1px solid rgba(15, 39, 70, 0.08);
            }

            .public-static-section h2,
            .public-static-richtext h2,
            .public-static-richtext h3 {
                margin-bottom: 0.9rem;
                color: #12304f;
                font-size: 1.4rem;
                font-weight: 700;
            }

            .public-static-section p,
            .public-static-richtext p,
            .public-static-richtext li {
                color: #556273;
                line-height: 1.75;
                font-size: 0.98rem;
            }

            .public-static-section ul,
            .public-static-richtext ul,
            .public-static-richtext ol {
                margin: 0.85rem 0 0;
                padding-left: 1.2rem;
            }

            .public-static-links .list-group-item {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1rem;
                padding: 0.95rem 0;
                border: 0;
                border-bottom: 1px solid rgba(15, 39, 70, 0.08);
                color: #284766;
                font-weight: 600;
                background: transparent;
            }

            .public-static-links .list-group-item:last-child {
                border-bottom: 0;
            }

            .public-static-links .list-group-item.active {
                color: #0d7a7d;
            }

            .public-static-support {
                background: linear-gradient(180deg, #ffffff 0%, #f6fbfb 100%);
            }

            .public-static-support ul {
                margin: 1rem 0 0;
                padding: 0;
                list-style: none;
            }

            .public-static-support li {
                display: flex;
                align-items: flex-start;
                gap: 0.75rem;
                color: #556273;
                margin-bottom: 0.8rem;
            }

            .public-static-support i {
                color: #0d7a7d;
                font-size: 1rem;
                margin-top: 0.2rem;
            }

            .public-static-actions {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem;
                margin-top: 1.25rem;
            }

            .public-static-actions .btn {
                border-radius: 999px;
                padding: 0.7rem 1.1rem;
                font-weight: 600;
            }

            @media (max-width: 991.98px) {
                .public-static-panel {
                    border-radius: 20px;
                    padding: 1.35rem;
                }

                .public-static-breadcrumb {
                    white-space: normal;
                }
            }
        </style>
    </th:block>

    <div layout:fragment="main_content">
        <section class="public-static-hero">
            <div class="container">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-end gap-3">
                    <div>
                        <div class="public-static-eyebrow" th:text="${pageEyebrow}">Store policies</div>
                        <h1 th:text="${pageHeading}">Privacy Policy</h1>
                        <p th:text="${pageIntro}">Helpful guidance for customers.</p>
                    </div>
                    <div class="public-static-breadcrumb">
                        <a th:href="@{/}">Home</a>
                        <span class="mx-2">/</span>
                        <span th:text="${pageHeading}">Privacy Policy</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="public-static-page">
            <div class="container">
                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="public-static-panel">
                            <div class="public-static-richtext"
                                 th:if="${pageHtml != null and !#strings.isEmpty(pageHtml)}"
                                 th:utext="${pageHtml}">
                            </div>

                            <div th:if="${pageHtml == null or #strings.isEmpty(pageHtml)}">
                                <div class="public-static-section" th:each="section : ${pageSections}">
                                    <h2 th:text="${section.title}">Section title</h2>
                                    <p th:each="paragraph : ${section.paragraphs}" th:text="${paragraph}">
                                        Section paragraph
                                    </p>
                                    <ul th:if="${section.bullets != null and !#lists.isEmpty(section.bullets)}">
                                        <li th:each="bullet : ${section.bullets}" th:text="${bullet}">Bullet point</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4">
                        <div class="public-static-panel">
                            <h3>Quick Links</h3>
                            <div class="list-group list-group-flush public-static-links">
                                <a class="list-group-item list-group-item-action"
                                   th:each="link : ${staticPageLinks}"
                                   th:href="${link.href}"
                                   th:classappend="${link.active} ? ' active' : ''">
                                    <span th:text="${link.label}">Privacy Policy</span>
                                    <i class="bi bi-arrow-right-short"></i>
                                </a>
                            </div>
                        </div>


                    </div>
                </div>
            </div>
        </section>
    </div>
</div>
