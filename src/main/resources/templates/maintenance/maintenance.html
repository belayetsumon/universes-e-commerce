<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title th:text="${session.globalSettings.siteName} + ' - Maintenance'">Maintenance</title>

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link rel="stylesheet" th:href="@{/bootstrap-5.2.3-dist/css/bootstrap.min.css}">

        <style>
            body {
                background: linear-gradient(135deg, #f8f9fa, #e9ecef);
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .maintenance-box {
                max-width: 600px;
                text-align: center;
                background: #fff;
                padding: 40px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            }

            .logo {
                max-height: 60px;
                max-width: 60px;
                object-fit: contain;
                margin-bottom: 20px;
            }

            .icon {
                font-size: 60px;
                color: #ffc107;
            }
        </style>
    </head>

    <body>

        <div class="maintenance-box">

            <!-- Logo -->
            <div>
                <img th:if="${session.globalSettings.resolvedSiteLogoSquare != null}"
                     th:src="@{${session.globalSettings.resolvedSiteLogoSquare}}"
                     class="logo"
                     alt="logo">

                <h3 th:if="${session.globalSettings.resolvedSiteLogoSquare == null}"
                    th:text="${session.globalSettings.siteName}">
                    My Website
                </h3>
            </div>

            <!-- Icon -->
            <div class="icon mb-3">
                ⚙️
            </div>

            <!-- Title -->
            <h4 class="mb-3">
                We are under maintenance
            </h4>

            <!-- Message -->
            <p class="text-muted mb-4"
               th:text="${message != null ? message : session.globalSettings.maintenanceMessage}">
                Our website is currently under maintenance. Please check back later.
            </p>

            <!-- Contact -->
            <div class="mt-3">

                <p th:if="${session.globalSettings.supportEmail}">
                    📧 <span th:text="${session.globalSettings.supportEmail}"></span>
                </p>

                <p th:if="${session.globalSettings.supportPhone}">
                    📞 <span th:text="${session.globalSettings.supportPhone}"></span>
                </p>

            </div>

            <!-- Social -->
            <div class="mt-4">
                <a th:if="${session.globalSettings.facebookUrl}" th:href="${session.globalSettings.facebookUrl}" target="_blank">Facebook</a> |
                <a th:if="${session.globalSettings.instagramUrl}" th:href="${session.globalSettings.instagramUrl}" target="_blank">Instagram</a> |
                <a th:if="${session.globalSettings.youtubeUrl}" th:href="${session.globalSettings.youtubeUrl}" target="_blank">YouTube</a>
            </div>

        </div>

        <script th:src="@{/bootstrap-5.2.3-dist/js/bootstrap.bundle.min.js}"></script>
    </body>
</html>
