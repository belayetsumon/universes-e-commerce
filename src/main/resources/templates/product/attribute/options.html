<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h4 th:text="${'Options: ' + attribute.name}">Options</h4>
            </div>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/catalog-attributes/list}">Back</a>
        </div>

        <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>
        <div class="alert alert-danger" th:if="${errorMessage}" th:text="${errorMessage}"></div>

        <div class="row g-3">
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-body">
                        <h6 class="mb-3" th:text="${attributeOption.id == null ? 'Add Option' : 'Edit Option'}">Add Option</h6>
                        <form th:action="@{/catalog-attributes/options/save}" th:object="${attributeOption}" method="post">
                            <input type="hidden" th:field="*{id}">
                            <input type="hidden" th:field="*{uuid}">
                            <input type="hidden" th:field="*{version}">
                            <input type="hidden" name="attributeUuid" th:value="${attribute.uuid}">

                            <div class="mb-3">
                                <label class="form-label">Label</label>
                                <input type="text" class="form-control" th:field="*{label}" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('label')}" th:errors="*{label}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Stored Value</label>
                                <input type="text" class="form-control" th:field="*{value}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Sort Order</label>
                                <input type="number" class="form-control" th:field="*{sortOrder}">
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" th:field="*{active}" id="optionActive">
                                <label class="form-check-label" for="optionActive">Active</label>
                            </div>
                            <button type="submit" class="btn btn-success btn-sm">Save Option</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card">
                    <div class="card-body table-responsive">
                        <table class="table table-bordered table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>Label</th>
                                    <th>Value</th>
                                    <th>Sort</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="option : ${options}">
                                    <td th:text="${option.label}">Label</td>
                                    <td th:text="${option.value}">value</td>
                                    <td th:text="${option.sortOrder}">0</td>
                                    <td class="text-nowrap">
                                        <a class="btn btn-sm btn-outline-primary"
                                           th:href="@{/catalog-attributes/options/{uuid}(uuid=${attribute.uuid}, editUuid=${option.uuid})}">Edit</a>
                                        <a class="btn btn-sm btn-outline-danger"
                                           th:href="@{/catalog-attributes/options/delete/{uuid}(uuid=${option.uuid})}">Delete</a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(options)}">
                                    <td colspan="4" class="text-center text-muted">No options added yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
