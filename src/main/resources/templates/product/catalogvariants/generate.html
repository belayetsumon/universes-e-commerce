<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org">
    <div class="modal-header">
        <h5 class="modal-title">Generate Catalog Variants</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>

    <form th:action="@{/catalog-variants/generate}"
          th:hx-post="@{/catalog-variants/generate}"
          hx-target="#deliveryOptionsModal .modal-content"
          hx-swap="innerHTML"
          method="post">
        <div class="modal-body">
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <div class="alert alert-info">
                2026-05-15: Leave a selector empty to include all active options for that attribute.
            </div>

            <input type="hidden" name="productUuid" th:value="${productUuid}" />

            <div class="row g-3" th:if="${variantSelections != null and !#lists.isEmpty(variantSelections)}">
                <div class="col-12" th:each="selection : ${variantSelections}">
                    <label class="form-label" th:text="${selection.attributeName}">Attribute</label>
                    <select class="form-select"
                            multiple
                            size="6"
                            th:name="${'generateAttribute_' + selection.attributeUuid}">
                        <option th:each="optionRow : ${selection.options}"
                                th:value="${optionRow.uuid}"
                                th:text="${optionRow.label}">Option</option>
                    </select>
                    <div class="form-text">Hold Ctrl or Command to pick specific options.</div>
                </div>
            </div>

            <div class="alert alert-warning mb-0" th:if="${variantSelections == null or #lists.isEmpty(variantSelections)}">
                No variant-capable attributes are mapped to this product category yet.
            </div>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
            <button type="submit" class="btn btn-primary">Generate Variants</button>
        </div>
    </form>
</div>
