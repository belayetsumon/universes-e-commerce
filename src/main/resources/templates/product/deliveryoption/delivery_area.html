<div class="modal-header">
    <h1 class="modal-title fs-5" id="exampleModalLabel">Add/Edit Delivery Area</h1>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<div class="modal-body">

    <form id="deliveryAreaForm"
        th:hx-post="@{/availabledeliveryarea/save}" 
        hx-trigger="submit"
        hx-target=".modal-content"
        hx-swap="innerHTML"
        method="post"
        enctype="multipart/form-data" 
        th:object="${availableDeliveryArea}">

        <div class="form-group">
            <input type="hidden" class="form-control" th:field="*{id}" >
            <input type="hidden" class="form-control" th:field="*{product}" >
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        </div>

        <div th:if="${errorMessage != null}" class="alert alert-danger" role="alert">
            <strong>Error:</strong> <span th:text="${errorMessage}"></span>
        </div>

        <div class="mb-3">
            <label class="form-label">Coverage Mode</label>
            <select class="form-select" th:field="*{mode}" id="deliveryAreaMode" required>
                <option th:each="mode : ${deliveryAreaModes}" th:value="${mode}" th:text="${mode.label}"></option>
            </select>
        </div>

        <div class="mb-3" id="specificLocationGroup">
            <label class="form-label">Selected Areas</label>
            <select class="form-select" th:field="*{selectedDistricts}" id="deliveryLocations" multiple size="8">
                <option th:each="location : ${districts}" th:value="${location.id}" th:text="${location.displayLabel}"></option>
            </select>
            <div class="form-text">Use multi-select for Specific Area mode.</div>
        </div>

        <div class="mb-3 d-none" id="excludedLocationGroup">
            <label class="form-label">Excluded Locations</label>
            <select class="form-select" th:field="*{excludedDistricts}" id="excludedLocations" multiple size="8">
                <option th:each="location : ${districts}" th:value="${location.id}" th:text="${location.displayLabel}"></option>
            </select>
            <div class="form-text">Use this for "All Area Except", for example exclude Cumilla only.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Note</label>
            <textarea min="0" class="form-control" th:field="*{description}" rows="3"></textarea>
            <div class="form-text">Optional note only. Delivery matching uses the selected structured locations above.</div>
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"> Close</button>
            <button type="submit" class="btn btn-success">Submit</button>
        </div>

    </form>

    <script>
        // Show only the relevant location inputs for the selected delivery coverage mode.
        (() => {
            const modeSelect = document.getElementById('deliveryAreaMode');
            const specificGroup = document.getElementById('specificLocationGroup');
            const excludedGroup = document.getElementById('excludedLocationGroup');
            const locationSelect = document.getElementById('deliveryLocations');
            const excludedSelect = document.getElementById('excludedLocations');

            if (!modeSelect) {
                return;
            }

            function updateDeliveryAreaModeUi() {
                const mode = modeSelect.value;
                const isSpecific = mode === 'SPECIFIC_AREA';
                const isAllExcept = mode === 'ALL_AREA_EXCEPT';

                specificGroup.classList.toggle('d-none', !isSpecific);
                excludedGroup.classList.toggle('d-none', !isAllExcept);

                if (locationSelect) {
                    if (!isSpecific) {
                        Array.from(locationSelect.options).forEach((option) => option.selected = false);
                    }
                }

                if (excludedSelect && !isAllExcept) {
                    Array.from(excludedSelect.options).forEach((option) => option.selected = false);
                }
            }

            modeSelect.addEventListener('change', updateDeliveryAreaModeUi);
            updateDeliveryAreaModeUi();

            const form = document.getElementById('deliveryAreaForm');
            if (form) {
                form.addEventListener('htmx:responseError', function () {
                    const errorBox = form.querySelector('.alert-danger');
                    if (!errorBox) {
                        return;
                    }
                    errorBox.scrollIntoView({behavior: 'smooth', block: 'center'});
                });
            }
        })();
    </script>
</div>
