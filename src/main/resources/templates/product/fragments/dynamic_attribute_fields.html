<div xmlns:th="http://www.thymeleaf.org" th:fragment="dynamicAttributeFields">
    <div class="card mt-4">
        <div class="card-header">
            <strong>Dynamic Specifications</strong>
            <div class="text-muted small">These fields come from the selected category mapping.</div>
        </div>
        <div class="card-body">
            <div th:if="${#lists.isEmpty(dynamicAttributeFields)}" class="text-muted">
                Select a category with attribute mappings to configure product specifications.
            </div>

            <div th:each="field : ${dynamicAttributeFields}" class="mb-4">
                <label class="form-label fw-semibold">
                    <span th:text="${field.attributeName}">Attribute</span>
                    <span class="text-danger" th:if="${field.required}">*</span>
                    <span class="badge bg-warning text-dark ms-2" th:if="${field.variantAttribute}">Variant Attribute</span>
                </label>
                <div class="text-muted small mb-2" th:if="${field.helperText}" th:text="${field.helperText}">Helper text</div>

                <div th:switch="${field.inputType.name()}">
                    <select th:case="'SINGLE_SELECT'" class="form-select" th:name="${'attr_' + field.attributeUuid}"
                            th:attr="required=${field.required} ? 'required' : null">
                        <option value="">Select one</option>
                        <option th:each="option : ${field.options}"
                                th:value="${option.uuid}"
                                th:text="${option.label}"
                                th:selected="${#lists.contains(field.selectedOptionUuids, option.uuid)}"></option>
                    </select>

                    <select th:case="'MULTI_SELECT'" class="form-select" multiple th:name="${'attr_' + field.attributeUuid}"
                            th:attr="required=${field.required} ? 'required' : null">
                        <option th:each="option : ${field.options}"
                                th:value="${option.uuid}"
                                th:text="${option.label}"
                                th:selected="${#lists.contains(field.selectedOptionUuids, option.uuid)}"></option>
                    </select>
                    <div class="form-text" th:case="'MULTI_SELECT'">Hold Ctrl or Command to choose multiple options.</div>

                    <textarea th:case="'TEXTAREA'" class="form-control" rows="4"
                              th:attr="required=${field.required} ? 'required' : null"
                              th:name="${'attr_' + field.attributeUuid}"
                              th:text="${field.allowMultipleValues} ? ${field.multiLineValue} : ${field.scalarValue}"></textarea>

                    <textarea th:case="*"
                              th:if="${field.allowMultipleValues and field.inputType.name() != 'BOOLEAN' and field.inputType.name() != 'DATE' and field.inputType.name() != 'NUMBER' and field.inputType.name() != 'DECIMAL'}"
                              class="form-control"
                              rows="4"
                              th:attr="required=${field.required} ? 'required' : null"
                              th:name="${'attr_' + field.attributeUuid}"
                              th:text="${field.multiLineValue}"></textarea>
                    <div class="form-text"
                         th:if="${field.allowMultipleValues and field.inputType.name() != 'BOOLEAN' and field.inputType.name() != 'DATE' and field.inputType.name() != 'NUMBER' and field.inputType.name() != 'DECIMAL'}">
                        One value per line.
                    </div>

                    <div th:if="${field.inputType.name() == 'BOOLEAN'}">
                        <input type="hidden" th:name="${'attr_' + field.attributeUuid}" value="false">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   th:id="${'attr_' + field.attributeUuid}"
                                   th:name="${'attr_' + field.attributeUuid}"
                                   value="true"
                                   th:checked="${field.scalarValue == 'true' or field.scalarValue == 'Yes'}">
                            <label class="form-check-label" th:for="${'attr_' + field.attributeUuid}">Yes</label>
                        </div>
                    </div>

                    <input th:if="${field.inputType.name() == 'DATE'}" type="date" class="form-control"
                           th:attr="required=${field.required} ? 'required' : null"
                           th:name="${'attr_' + field.attributeUuid}" th:value="${field.scalarValue}">

                    <input th:if="${field.inputType.name() == 'NUMBER'}" type="number" step="1" class="form-control"
                           th:attr="required=${field.required} ? 'required' : null"
                           th:name="${'attr_' + field.attributeUuid}" th:value="${field.scalarValue}">

                    <input th:if="${field.inputType.name() == 'DECIMAL'}" type="number" step="0.01" class="form-control"
                           th:attr="required=${field.required} ? 'required' : null"
                           th:name="${'attr_' + field.attributeUuid}" th:value="${field.scalarValue}">

                    <input th:if="${!field.allowMultipleValues and field.inputType.name() == 'TEXT'}" type="text" class="form-control"
                           th:attr="required=${field.required} ? 'required' : null"
                           th:name="${'attr_' + field.attributeUuid}" th:value="${field.scalarValue}">
                </div>
            </div>
        </div>
    </div>
</div>
