
<section>
    <div class="container py-1 storefront-topbar">
        <div class="row align-items-center">

            <!-- 🔹 Left: Welcome text -->
            <div class="col-12 col-sm-6 text-start">
                <span th:text="${session.globalSettings.siteTagline != null and !#strings.isEmpty(session.globalSettings.siteTagline) ? session.globalSettings.siteTagline : 'Welcome to ' + session.globalSettings.siteName + '!'}">
                    Welcome to our store!
                </span>
            </div>

            <!-- 🔹 Right: Menu items -->
            <div class="col-12 col-sm-6 text-end">
                <div class="d-flex justify-content-end flex-wrap gap-2">

                    <!-- Language Dropdown -->
                    <div class="dropdown">
                        <a href="#" class="nav-link dropdown-toggle text-decoration-none"
                           data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-translate"></i>
                            <span th:text="${currentShippingDistrict != null ? currentShippingDistrict : 'Select Shipping District'}"></span>
                        </a>

                        <ul class="dropdown-menu">
                            <th:block th:each="d : ${shippinglocations}">
                                <li>
                                    <button class="dropdown-item district-btn"
                                            type="button"
                                            th:data-district="${d}">
                                        [[${d}]]
                                    </button>
                                </li>
                            </th:block>
                        </ul>

                        <!--                        <ul class="dropdown-menu">
                                                    <th:block th:each="d : ${shippinglocations}">
                                                        <li>
                                                            <form method="post" th:action="@{/district/select2}">
                                                                <input type="hidden" name="district" th:value="${d}" />
                                                                <button class="dropdown-item" type="submit" th:text="${d}"></button>
                                                            </form>
                                                        </li>
                                                    </th:block>
                                                </ul>-->
                    </div>

                    <!-- Currency Dropdown -->
                    <div class="dropdown">
                        <a href="#" class="nav-link dropdown-toggle text-decoration-none" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="bi bi-currency-exchange"></i>
                            <span th:text="${session.globalSettings.defaultCurrency != null ? session.globalSettings.defaultCurrency : session.globalSettings.currency}">Currency</span>
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">USD</a></li>
                            <li><a class="dropdown-item" href="#">BDT</a></li>
                            <li><a class="dropdown-item" href="#">EUR</a></li>
                        </ul>
                    </div>

                    <!-- Track Order -->
                    <a href="#" class="nav-link text-decoration-none d-flex align-items-center">
                        <i class="bi bi-binoculars me-1"></i> Track Your Order
                    </a>

                    <!-- Help -->
                    <a href="#" class="nav-link text-decoration-none d-flex align-items-center">
                        <i class="bi bi-question-circle me-1"></i> Help?
                    </a>

                </div>
            </div>

        </div>
    </div>



</section>
<header>

    <nav class="navbar navbar-expand-md navbar-light bg-white py-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">

            <!-- 🔹 Left: Logo -->
            <div class="d-flex align-items-center">

                <a class="navbar-brand" th:href="@{/}">
                    <picture th:if="${session.globalSettings.resolvedSiteLogoDesktop != null}">
                        <source media="(max-width: 767.98px)"
                                th:srcset="@{${session.globalSettings.resolvedSiteLogoMobile}}">
                        <img th:src="@{${session.globalSettings.resolvedSiteLogoDesktop}}"
                             th:alt="${session.globalSettings.siteName}"
                             class="storefront-logo-image">
                    </picture>
                    <span th:if="${session.globalSettings.resolvedSiteLogoDesktop == null}"
                          th:text="${session.globalSettings.siteName}">
                        Store Name
                    </span>
                </a>
            </div>

            <!-- 🔹 Center: Search -->
            <div class="flex-fill mx-3">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search" aria-label="Search">
                    <button class="btn btn-danger" type="submit">
                        <i class="bi bi-search"></i>
                    </button>
                </div>
            </div>

            <!-- 🔹 Right: Icons & Login/Register -->
            <div class="d-flex align-items-center gap-3">

                <!-- Wishlist -->
                <a class="nav-link d-flex align-items-center" th:href="@{/wishlist/index}">
                    <i class="bi bi-suit-heart text-reds fs-4 me-1"></i>
                    <span>Wishlist</span>
                    <span class="badge bg-danger ms-1 text-white" th:text="${wishlistCount}">0</span>
                </a>

                <!-- My Cart Dropdown -->
                <div class="nav-item dropdown">
                    <div class="nav-link d-flex align-items-center" href="#" id="cartDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false"
                         hx-get="/cart/count" hx-trigger="every 2s" hx-target="#cart-count" hx-swap="outerHTML">
                        <i class="bi bi-cart4 text-reds fs-4 me-1"></i>
                        <span >My Cart</span>
                        <span class="badge bg-danger ms-1 text-white cart-count" id="cart-count">0</span>
                    </div>

                    <div class="dropdown-menu table-dropdown p-2 storefront-cart-dropdown-menu" aria-labelledby="cartDropdown">
                        <table class="table table-sm  mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Product</th>
                                    <th>Qty</th>
                                    <th>Price</th>
                                    <th>Total</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cart,status : ${session.sessioncart}">
                                    <td th:text="${status.count}">Otto</td>
                                    <td th:text="${cart.product.title}">Otto</td>
                                    <td th:text="${cart.quantity}"></td>
                                    <td th:text="${cart.salesPrice}"></td>
                                    <td th:text="${cart.itemTotal}">Otto</td>
                                    <td><span class="text-danger ms-2">&times;</span></td>
                                </tr>
                            </tbody>
                            <tfoot>
                                <tr>
                                    <td colspan="2" class="text-end fw-bold"><a th:href="@{/cart/index}"> View Cart</a></td>
                                    <td colspan="3" class="text-end fw-bold">Grand Total</td>
                                    <td class="fw-bold">

                                        <!--                                                                    <h1 th:text="${@thymeleafUtils.hello()}"></h1>

                                                                                                                                                    <span th:text="${#lists.isEmpty(session.sessioncart) ? 0 : thymeleafUtils.sumItemTotals(session.sessioncart)}"></span>-->
                                    </td>

                                </tr>
                            </tfoot>
                        </table></div>
                </div>

                <!-- Login / Logout -->
                <div sec:authorize="!isAuthenticated()">
                    <a class="nav-link d-flex align-items-center" th:href="@{/public/member-login}">
                        <i class="bi bi-person text-reds fs-5 me-1"></i> Login
                    </a>
                </div>

                <div sec:authorize="isAuthenticated()">
                    <a class="nav-link d-flex align-items-center" th:href="@{/users/logout}">
                        <i class="bi bi-box-arrow-right text-reds fs-5 me-1"></i> Logout
                    </a>
                </div>

                <!-- Register -->
                <div sec:authorize="!isAuthenticated()" th:if="${session.globalSettings.registrationEnabled}">
                    <a class="nav-link d-flex align-items-center" th:href="@{/public/front-registration}">
                        <i class="bi bi-person-plus text-reds fs-5 me-1"></i> Register
                    </a>
                </div>

            </div>

        </div>
    </nav>



</header>
