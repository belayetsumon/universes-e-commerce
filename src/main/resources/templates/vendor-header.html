<div xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     th:fragment="vendorHeader">
    <nav class="navbar navbar-expand-lg vendor-header-nav bg-white border-bottom shadow-sm py-2">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand d-flex align-items-center gap-2 mb-0 vendor-topbar-brand" th:href="@{/vendor/home}">
                <picture class="vendor-topbar-logo-picture"
                         th:if="${session.globalSettings.resolvedSiteLogoDesktop != null}">
                    <img th:src="@{${session.globalSettings.resolvedSiteLogoDesktop}}"
                         th:alt="${session.globalSettings.siteName}"
                         class="vendor-topbar-logo-image">
                </picture>
                <span class="fw-semibold vendor-topbar-brand-name"
                      th:text="${session.globalSettings.siteName != null ? session.globalSettings.siteName : 'Store'}">
                    Store
                </span>
                <span class="badge text-bg-primary vendor-topbar-badge">Vendor</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#vendorHeaderNav" aria-controls="vendorHeaderNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="vendorHeaderNav">
                <div class="navbar-nav me-auto mb-3 mb-lg-0">
                    <a class="nav-link" th:href="@{/vendor/home}">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                    <a class="nav-link" th:href="@{/productvendor/index}">
                        <i class="bi bi-box-seam me-1"></i> Products
                    </a>
                    <a class="nav-link" th:href="@{/vendor-order/index}">
                        <i class="bi bi-journal-text me-1"></i> Orders
                    </a>
                    <a class="nav-link" th:href="@{/vendor/stock/transactions}">
                        <i class="bi bi-archive me-1"></i> Inventory
                    </a>
                </div>

                <div class="d-flex flex-column flex-lg-row align-items-lg-center gap-2">
                    <a class="btn btn-outline-primary btn-sm position-relative" th:href="@{/vendor/notifications}">
                        <i class="bi bi-bell me-1"></i> Notifications
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              th:if="${communicationUnreadCount != null and communicationUnreadCount > 0}"
                              th:text="${communicationUnreadCount}">0</span>
                    </a>
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">
                        <i class="bi bi-shop me-1"></i> Storefront
                    </a>
                    <a class="btn btn-outline-danger btn-sm" th:href="@{/users/logout}" sec:authorize="isAuthenticated()">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </a>
                    <a class="btn btn-primary btn-sm" th:href="@{/public/member-login}" sec:authorize="!isAuthenticated()">
                        <i class="bi bi-person me-1"></i> Login
                    </a>
                </div>
            </div>
        </div>
    </nav>
</div>
