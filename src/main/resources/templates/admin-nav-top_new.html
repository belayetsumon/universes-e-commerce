<nav class="navbar navbar-expand-lg admin-topbar"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container-fluid admin-topbar-inner">
        <div class="admin-topbar-left">
            <button class="btn admin-topbar-toggle"
                    id="sidebar-toggle-btn"
                    type="button"
                    aria-label="Toggle admin navigation">
                <i class="bi bi-list"></i>
            </button>


        </div>

        <button class="navbar-toggler admin-topbar-mobile-toggle"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#adminTopbarNav"
                aria-controls="adminTopbarNav"
                aria-expanded="false"
                aria-label="Toggle top bar">
            <i class="bi bi-three-dots"></i>
        </button>

        <div class="collapse navbar-collapse admin-topbar-collapse" id="adminTopbarNav">
            <div class="admin-topbar-actions ms-auto">
                <a class="btn admin-topbar-action admin-topbar-action--ghost"
                   th:href="@{/admin/index}">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>

                <a class="btn admin-topbar-action admin-topbar-action--ghost position-relative"
                   th:href="@{/admin/notifications}">
                    <i class="bi bi-bell"></i>
                    <span>Notifications</span>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                          th:if="${communicationUnreadCount != null and communicationUnreadCount > 0}"
                          th:text="${communicationUnreadCount}">0</span>
                </a>

                <a class="btn admin-topbar-action admin-topbar-action--storefront"
                   th:href="@{/}"
                   target="_blank"
                   rel="noopener">
                    <i class="bi bi-shop-window"></i>
                    <span>Storefront</span>
                    <i class="bi bi-box-arrow-up-right admin-topbar-action-external"></i>
                </a>

                <div class="dropdown admin-user-menu" sec:authorize="isAuthenticated()">
                    <button class="btn admin-user-menu-trigger dropdown-toggle"
                            type="button"
                            id="adminUserMenu"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <span class="admin-user-avatar">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <span class="admin-user-copy">
                            <small>Signed in</small>
                            <strong sec:authentication="name">admin@example.com</strong>
                        </span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end admin-user-dropdown" aria-labelledby="adminUserMenu">
                        <li class="admin-user-dropdown-head">
                            <span class="admin-user-avatar admin-user-avatar--menu">
                                <i class="bi bi-person-fill"></i>
                            </span>
                            <span>
                                <small>Account</small>
                                <strong sec:authentication="name">admin@example.com</strong>
                            </span>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item" th:href="@{/customer-profile/index}">
                                <i class="bi bi-person-badge"></i>
                                <span>My account</span>
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <a class="dropdown-item admin-user-logout" th:href="@{/users/logout}">
                                <i class="bi bi-box-arrow-right"></i>
                                <span>Log out</span>
                            </a>
                        </li>
                    </ul>
                </div>

                <a class="btn admin-topbar-action admin-topbar-action--storefront"
                   th:href="@{/public/member-login}"
                   sec:authorize="!isAuthenticated()">
                    <i class="bi bi-box-arrow-in-right"></i>
                    <span>Login</span>
                </a>
            </div>
        </div>
    </div>
</nav>
