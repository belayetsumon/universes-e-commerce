<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0"><i class="bi bi-chat-dots me-2 text-primary"></i>Comment Moderation</h4></section>
        <div th:replace="admin/blog/fragments :: tabs('comments')"></div>
        <div th:replace="admin/blog/fragments :: alerts"></div>
        <div class="card border-0 shadow-sm mb-3"><div class="card-body">
            <form class="row g-2" method="get" th:action="@{/admin/blog/comments}">
                <div class="col-md-4"><select class="form-select" name="status"><option value="">All comments</option><option th:each="status : ${moderationStatuses}" th:value="${status}" th:selected="${selectedStatus == status}" th:text="${status}"></option></select></div>
                <div class="col-md-2 d-grid"><button class="btn btn-primary">Filter</button></div>
            </form>
        </div></div>
        <div class="card border-0 shadow-sm"><div class="card-body table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light"><tr><th>Comment</th><th>Article</th><th>Status</th><th>Submitted</th><th class="text-end">Moderate</th></tr></thead>
                <tbody>
                    <tr th:each="comment : ${comments.content}">
                        <td><div class="fw-semibold" th:text="${comment.guestName}"></div><small th:text="${comment.commentText}"></small></td>
                        <td th:text="${comment.blog != null ? comment.blog.title : '-'}"></td>
                        <td><span class="badge bg-secondary" th:text="${comment.moderationStatus}"></span></td>
                        <td th:text="${comment.createdAt}"></td>
                        <td class="text-end">
                            <form class="d-inline" method="post" th:action="@{/admin/blog/comments/{id}/moderate(id=${comment.id})}"><input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><input type="hidden" name="status" value="APPROVED"><button class="btn btn-sm btn-success">Approve</button></form>
                            <form class="d-inline" method="post" th:action="@{/admin/blog/comments/{id}/moderate(id=${comment.id})}"><input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><input type="hidden" name="status" value="SPAM"><button class="btn btn-sm btn-outline-danger">Spam</button></form>
                        </td>
                    </tr>
                    <tr th:if="${comments.empty}"><td colspan="5" class="text-center text-muted py-4">No comments found.</td></tr>
                </tbody>
            </table>
        </div></div>
    </div>
</div>
