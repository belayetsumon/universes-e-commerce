<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <div layout:fragment="main_content" class="blog-admin-page">
        <div class="blog-settings-workspace">
            <div th:replace="admin/blog/fragments :: moduleHeader('posts', 'Version History', ${blog.title}, 'bi-clock-history', 'Audit', @{/admin/blog/{id}/edit(id=${blog.id})}, 'Edit Article', 'bi-pencil', null, null, null)"></div>
            <div class="card border-0 shadow-sm blog-table-card"><div class="card-body table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light"><tr><th>Revision</th><th>Title</th><th>Summary</th><th>Created By</th><th>Created</th></tr></thead>
                    <tbody>
                        <tr th:each="revision : ${revisions}"><td th:text="${revision.revisionNumber}"></td><td th:text="${revision.title}"></td><td th:text="${revision.changeSummary}"></td><td th:text="${revision.createdBy}"></td><td th:text="${revision.createdAt}"></td></tr>
                        <tr th:if="${#lists.isEmpty(revisions)}"><td colspan="5" class="text-center text-muted py-4">No revisions found.</td></tr>
                    </tbody>
                </table>
            </div></div>
        </div>
    </div>
</div>
