<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="d-flex justify-content-between align-items-center mb-3"><div><h4 class="mb-0"><i class="bi bi-clock-history me-2 text-primary"></i>Version History</h4><p class="text-muted mb-0" th:text="${blog.title}"></p></div><a class="btn btn-outline-secondary" th:href="@{/admin/blog/{id}/edit(id=${blog.id})}">Edit</a></section>
        <div th:replace="admin/blog/fragments :: tabs('posts')"></div>
        <div class="card border-0 shadow-sm"><div class="card-body table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light"><tr><th>Revision</th><th>Title</th><th>Summary</th><th>Created By</th><th>Created</th></tr></thead>
                <tbody>
                    <tr th:each="revision : ${revisions}"><td th:text="${revision.revisionNumber}"></td><td th:text="${revision.title}"></td><td th:text="${revision.changeSummary}"></td><td th:text="${revision.createdBy}"></td><td th:text="${revision.createdAt}"></td></tr>
                    <tr th:if="${#lists.isEmpty(revisions)}"><td colspan="5" class="text-center text-muted py-4">No revisions found.</td></tr>
                </tbody>
            </table>
        </div></div>
    </div>
</div>
