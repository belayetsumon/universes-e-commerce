<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <div layout:fragment="main_content" class="blog-admin-page">
        <div class="blog-settings-workspace">
            <div th:replace="admin/blog/fragments :: moduleHeader('posts', 'Blog Import', 'Reserved import workflow for CSV and Excel article ingestion.', 'bi-upload', 'Utilities', null, null, null, @{/admin/blog}, 'Posts', 'bi-journal-text')"></div>
            <div class="card border-0 shadow-sm blog-form-card">
                <div class="card-body">
                    <p class="text-muted mb-0">CSV/Excel parsing is documented as the next import/export phase. The admin route is reserved so permissions, navigation, and workflow are stable.</p>
                </div>
            </div>
        </div>
    </div>
</div>
