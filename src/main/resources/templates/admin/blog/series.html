<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <div layout:fragment="main_content" class="blog-admin-page">
        <div class="blog-settings-workspace">
            <div th:replace="admin/blog/fragments :: moduleHeader('series', 'Blog Series', 'Group related articles into structured reading paths and campaigns.', 'bi-collection', 'Taxonomy', @{/admin/blog/series/new}, 'New Series', 'bi-plus-circle', null, null, null)"></div>
            <div th:replace="admin/blog/fragments :: alerts"></div>
            <div class="card border-0 shadow-sm blog-table-card">
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>Title</th><th>Slug</th><th>Sort</th><th class="text-end">Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="series : ${seriesPage.content}">
                                <td th:text="${series.title}"></td>
                                <td th:text="${series.slug}"></td>
                                <td th:text="${series.sortOrder}"></td>
                                <td class="text-end"><a class="btn btn-sm btn-primary" th:href="@{/admin/blog/series/{id}/edit(id=${series.id})}">Edit</a></td>
                            </tr>
                            <tr th:if="${seriesPage.empty}"><td colspan="4" class="text-center text-muted py-4">No series found.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
