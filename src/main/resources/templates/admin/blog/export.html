<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <div layout:fragment="main_content" class="blog-admin-page">
        <div class="blog-settings-workspace">
            <div th:replace="admin/blog/fragments :: moduleHeader('posts', 'Blog Export', 'Reserved export workspace for editorial content reports and archives.', 'bi-download', 'Utilities', null, null, null, @{/admin/blog}, 'Posts', 'bi-journal-text')"></div>
            <div class="card border-0 shadow-sm blog-form-card">
                <div class="card-body">
                    <p class="text-muted mb-0" th:text="${message}">Export phase placeholder.</p>
                </div>
            </div>
        </div>
    </div>
</div>
