<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <div layout:fragment="main_content" class="blog-admin-page">
        <div class="blog-settings-workspace">
            <div th:replace="admin/blog/fragments :: moduleHeader('categories', 'Blog Categories', 'Organize articles into discoverable editorial and storefront topics.', 'bi-folder2-open', 'Taxonomy', @{/admin/blog/categories/new}, 'New Category', 'bi-plus-circle', null, null, null)"></div>
            <div th:replace="admin/blog/fragments :: alerts"></div>
            <div class="card border-0 shadow-sm blog-table-card">
                <div class="card-body table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>Name</th><th>Slug</th><th>Status</th><th class="text-end">Actions</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="category : ${categories.content}">
                                <td th:text="${category.name}"></td>
                                <td th:text="${category.slug}"></td>
                                <td th:text="${category.recordStatus}"></td>
                                <td class="text-end"><a class="btn btn-sm btn-primary" th:href="@{/admin/blog/categories/{id}/edit(id=${category.id})}">Edit</a></td>
                            </tr>
                            <tr th:if="${categories.empty}"><td colspan="4" class="text-center text-muted py-4">No categories found.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
