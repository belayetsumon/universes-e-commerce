<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout"><div layout:fragment="main_content"><section class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0"><i class="bi bi-person-lines-fill me-2 text-primary"></i>Blog Authors</h4><a class="btn btn-primary" th:href="@{/admin/blog/authors/new}">New Author</a></section><div th:replace="admin/blog/fragments :: tabs('authors')"></div><div th:replace="admin/blog/fragments :: alerts"></div><div class="card border-0 shadow-sm"><div class="card-body table-responsive"><table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th>Name</th><th>Email</th><th>Slug</th><th class="text-end">Actions</th></tr></thead><tbody><tr th:each="author : ${authors.content}"><td th:text="${author.displayName}"></td><td th:text="${author.email}"></td><td th:text="${author.slug}"></td><td class="text-end"><a class="btn btn-sm btn-primary" th:href="@{/admin/blog/authors/{id}/edit(id=${author.id})}">Edit</a></td></tr><tr th:if="${authors.empty}"><td colspan="4" class="text-center text-muted py-4">No authors found.</td></tr></tbody></table></div></div></div></div>
