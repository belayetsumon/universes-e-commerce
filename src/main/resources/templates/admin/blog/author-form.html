<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout"><div layout:fragment="main_content"><section class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0">Blog Author</h4><a class="btn btn-outline-secondary" th:href="@{/admin/blog/authors}">Back</a></section><form class="card border-0 shadow-sm" method="post" th:action="@{/admin/blog/authors/save}" th:object="${author}"><div class="card-body row g-3"><input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><input type="hidden" th:field="*{id}"><input type="hidden" th:field="*{version}"><div class="col-md-6"><label class="form-label">Display Name</label><input class="form-control" th:field="*{displayName}"><div class="text-danger small" th:errors="*{displayName}"></div></div><div class="col-md-6"><label class="form-label">Slug</label><input class="form-control" th:field="*{slug}"></div><div class="col-md-6"><label class="form-label">Email</label><input class="form-control" th:field="*{email}"></div><div class="col-md-6"><label class="form-label">Avatar URL</label><input class="form-control" th:field="*{avatarUrl}"></div><div class="col-12"><label class="form-label">Bio</label><textarea class="form-control" rows="4" th:field="*{bio}"></textarea></div><div class="col-12"><button class="btn btn-primary">Save Author</button></div></div></form></div></div>
