<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="d-flex justify-content-between align-items-center mb-3"><h4 class="mb-0"><i class="bi bi-envelope-paper me-2 text-primary"></i>Blog Subscribers</h4></section>
        <div th:replace="admin/blog/fragments :: tabs('subscribers')"></div>
        <div class="card border-0 shadow-sm"><div class="card-body table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light"><tr><th>Email</th><th>Name</th><th>Status</th><th>Source</th><th>Consent</th></tr></thead>
                <tbody>
                    <tr th:each="subscriber : ${subscribers.content}">
                        <td th:text="${subscriber.email}"></td><td th:text="${subscriber.name}"></td><td><span class="badge bg-secondary" th:text="${subscriber.subscriberStatus}"></span></td><td th:text="${subscriber.source}"></td><td th:text="${subscriber.consentAt}"></td>
                    </tr>
                    <tr th:if="${subscribers.empty}"><td colspan="5" class="text-center text-muted py-4">No subscribers found.</td></tr>
                </tbody>
            </table>
        </div></div>
    </div>
</div>
