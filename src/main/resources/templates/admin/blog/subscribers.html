<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <div layout:fragment="main_content" class="blog-admin-page">
        <div class="blog-settings-workspace">
            <div th:replace="admin/blog/fragments :: moduleHeader('subscribers', 'Blog Subscribers', 'Review opt-in subscribers and consent records for content notifications.', 'bi-envelope-paper', 'Audience', null, null, null, null, null, null)"></div>
            <div class="card border-0 shadow-sm blog-table-card"><div class="card-body table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light"><tr><th>Email</th><th>Name</th><th>Status</th><th>Source</th><th>Consent</th></tr></thead>
                    <tbody>
                        <tr th:each="subscriber : ${subscribers.content}">
                            <td th:text="${subscriber.email}"></td><td th:text="${subscriber.name}"></td><td><span class="badge bg-secondary" th:text="${subscriber.subscriberStatus}"></span></td><td th:text="${subscriber.source}"></td><td th:text="${subscriber.consentAt}"></td>
                        </tr>
                        <tr th:if="${subscribers.empty}"><td colspan="5" class="text-center text-muted py-4">No subscribers found.</td></tr>
                    </tbody>
                </table>
            </div></div>
        </div>
    </div>
</div>
