<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">

        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h4 class="mb-1"><i class="bi bi-geo-alt me-2 text-primary"></i>Shipping Zones</h4>
                    <div class="text-muted small">Group countries, divisions, districts, and thanas for reusable carrier-rate coverage.</div>
                </div>
                <div class="btn-group">
                    <a class="btn btn-success btn-sm" th:href="@{/admin/shipping-zones/create}">
                        <i class="bi bi-plus-circle"></i> Add Zone
                    </a>
                    <a th:href="@{/admin/index}" type="button" class="btn btn-danger btn-sm">
                        <i class="bi bi-x-circle"></i> Close
                    </a>
                </div>
            </div>
        </section>

        <div class="card">
            <div class="card-header">
                <strong><i class="bi bi-list-task"></i> Zone List. Total: [[${zones != null ? zones.size() : 0}]]</strong>
            </div>
            <div class="card-body">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${zones == null or #lists.isEmpty(zones)}" class="alert alert-info mb-0">
                    No shipping zones have been created yet.
                </div>

                <div class="table-responsive" th:unless="${zones == null or #lists.isEmpty(zones)}">
                    <table class="table table-striped table-bordered table-sm align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Code</th>
                                <th>Coverage Locations</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th class="text-nowrap">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="z, stat : ${zones}">
                                <td th:text="${stat.count}"></td>
                                <td class="fw-semibold" th:text="${z.name}"></td>
                                <td th:text="${z.code != null and !#strings.isEmpty(z.code) ? z.code : '-'}"></td>
                                <td>
                                    <span th:if="${z.coverageLocations != null and !#lists.isEmpty(z.coverageLocations)}"
                                          th:each="location : ${z.coverageLocations}"
                                          class="badge bg-primary me-1 mb-1"
                                          th:text="${location.type + ': ' + location.name}">Location</span>
                                    <span th:if="${z.coverageLocations == null or #lists.isEmpty(z.coverageLocations)}">-</span>
                                </td>
                                <td th:text="${z.priority}"></td>
                                <td>
                                    <span class="badge" th:classappend="${z.active} ? ' bg-success' : ' bg-secondary'"
                                          th:text="${z.active ? 'Active' : 'Inactive'}">Active</span>
                                </td>
                                <td class="text-nowrap">
                                    <a th:href="@{'/admin/shipping-zones/edit/' + ${z.id}}" class="btn btn-sm btn-primary">
                                        <i class="bi bi-pencil-square"></i> Edit
                                    </a>
                                    <form th:action="@{/admin/shipping-zones/delete/{id}(id=${z.id})}" method="post" class="d-inline"
                                          onsubmit="return confirm('Delete this shipping zone?')">
                                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-danger">
                                            <i class="bi bi-trash"></i> Delete
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
