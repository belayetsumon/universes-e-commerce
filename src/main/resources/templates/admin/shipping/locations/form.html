<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h4 class="mb-1">
                        <i class="bi bi-globe2 me-2 text-primary"></i>
                        <span th:text="${location.id != null ? 'Edit Shipping Location' : 'Create Shipping Location'}">Shipping Location</span>
                    </h4>
                    <div class="text-muted small">Build a reusable international hierarchy for shipping coverage.</div>
                </div>
                <a class="btn btn-danger btn-sm" th:href="@{/admin/shipping-locations/list}">
                    <i class="bi bi-x-circle"></i> Close
                </a>
            </div>
        </section>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/admin/shipping-locations/save}" th:object="${location}" method="post" class="row g-3">
                    <input type="hidden" th:field="*{id}" />

                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
                        <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Type</label>
                        <select th:field="*{type}" class="form-select" required>
                            <option th:each="type : ${types}" th:value="${type}" th:text="${type}"></option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label">Parent</label>
                        <select name="parentId" class="form-select">
                            <option value="">No parent</option>
                            <option th:each="parent : ${parents}"
                                    th:if="${location.id == null or parent.id != location.id}"
                                    th:value="${parent.id}"
                                    th:selected="${selectedParentId != null and selectedParentId == parent.id}"
                                    th:text="${parent.type + ' - ' + parent.displayLabel}"></option>
                        </select>
                        <div class="form-text">Country has no parent. Division belongs to country, district to division, thana to district.</div>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Priority</label>
                        <input type="number" th:field="*{priority}" class="form-control" />
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Active</label>
                        <div class="form-check mt-2">
                            <input type="checkbox" th:field="*{active}" class="form-check-input" id="locationActive" />
                            <label class="form-check-label" for="locationActive">Enabled</label>
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Name</label>
                        <input th:field="*{name}" class="form-control" required />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Local Name</label>
                        <input th:field="*{localName}" class="form-control" />
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Code</label>
                        <input th:field="*{code}" class="form-control" required />
                        <div class="form-text">Use stable codes such as `BD`, `BD-DHAKA`, `DHAKA`, or provider codes.</div>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">ISO2</label>
                        <input th:field="*{iso2}" class="form-control" maxlength="2" />
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">ISO3</label>
                        <input th:field="*{iso3}" class="form-control" maxlength="3" />
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">External Code</label>
                        <input th:field="*{externalCode}" class="form-control" />
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Postal Code</label>
                        <input th:field="*{postalCode}" class="form-control" />
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Latitude</label>
                        <input type="number" step="0.000001" th:field="*{latitude}" class="form-control" />
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Longitude</label>
                        <input type="number" step="0.000001" th:field="*{longitude}" class="form-control" />
                    </div>

                    <div class="col-12 text-end">
                        <a th:href="@{/admin/shipping-locations/list}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Location
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
