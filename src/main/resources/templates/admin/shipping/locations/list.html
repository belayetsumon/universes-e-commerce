<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h4 class="mb-1"><i class="bi bi-globe2 me-2 text-primary"></i>Shipping Locations</h4>
                    <div class="text-muted small">Manage country, division/state, district/city, and thana/upazila coverage data.</div>
                </div>
                <a class="btn btn-success btn-sm" th:href="@{/admin/shipping-locations/create}">
                    <i class="bi bi-plus-circle"></i> Add Location
                </a>
            </div>
        </section>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="card">
            <div class="card-body table-responsive">
                <table class="table table-bordered table-striped table-sm align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Name</th>
                            <th>Code</th>
                            <th>Parent</th>
                            <th>ISO</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(locations)}">
                            <td colspan="9" class="text-center text-muted">No shipping locations found.</td>
                        </tr>
                        <tr th:each="location, stat : ${locations}">
                            <td th:text="${stat.count}"></td>
                            <td><span class="badge bg-info text-dark" th:text="${location.type}"></span></td>
                            <td>
                                <span class="fw-semibold" th:text="${location.name}"></span>
                                <small class="d-block text-muted" th:text="${location.localName != null ? location.localName : ''}"></small>
                            </td>
                            <td th:text="${location.code}"></td>
                            <td th:text="${location.parent != null ? location.parent.name : '-'}"></td>
                            <td th:text="${(location.iso2 != null ? location.iso2 : '-') + ' / ' + (location.iso3 != null ? location.iso3 : '-')}"></td>
                            <td>
                                <span class="badge" th:classappend="${location.active} ? ' bg-success' : ' bg-secondary'"
                                      th:text="${location.active ? 'Active' : 'Inactive'}"></span>
                            </td>
                            <td class="text-nowrap">
                                <a class="btn btn-sm btn-primary" th:href="@{/admin/shipping-locations/edit/{id}(id=${location.id})}">
                                    <i class="bi bi-pencil-square"></i> Edit
                                </a>
                                <form th:action="@{/admin/shipping-locations/delete/{id}(id=${location.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this location?')">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-danger">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
