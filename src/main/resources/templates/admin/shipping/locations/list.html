<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h4 class="mb-1"><i class="bi bi-globe2 me-2 text-primary"></i>Shipping Locations</h4>
                    <div class="text-muted small">Manage country, division/state, district/city, and thana/upazila coverage data.</div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <form th:action="@{/admin/system/seed/bangladesh-locations}" method="post" class="d-inline"
                          onsubmit="return confirm('Install the Bangladesh demo locations and all Dhaka metropolitan thanas? Existing seed records will not be duplicated.');">
                        <input type="hidden" name="returnTo" value="shipping-locations" />
                        <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="btn btn-outline-primary btn-sm" type="submit">
                            <i class="bi bi-cloud-download"></i> Install thana demo data
                        </button>
                    </form>
                    <a class="btn btn-success btn-sm" th:href="@{/admin/shipping-locations/create}">
                        <i class="bi bi-plus-circle"></i> Add Location
                    </a>
                </div>
            </div>
        </section>

        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="card">
            <div class="card-body table-responsive">
                <table id="shippingLocationsTable" class="table table-bordered table-striped table-sm align-middle w-100">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Type</th>
                            <th>Name</th>
                            <th>Code</th>
                            <th>Parent</th>
                            <th>ISO</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="location, stat : ${locations}">
                            <td th:text="${stat.count}"></td>
                            <td><span class="badge bg-info text-dark" th:text="${location.type}"></span></td>
                            <td>
                                <span class="fw-semibold" th:text="${location.name}"></span>
                                <small class="d-block text-muted" th:text="${location.localName != null ? location.localName : ''}"></small>
                            </td>
                            <td th:text="${location.code}"></td>
                            <td th:text="${location.parent != null ? location.parent.name : '-'}"></td>
                            <td th:text="${(location.iso2 != null ? location.iso2 : '-') + ' / ' + (location.iso3 != null ? location.iso3 : '-')}"></td>
                            <td>
                                <span class="badge" th:classappend="${location.active} ? ' bg-success' : ' bg-secondary'"
                                      th:text="${location.active ? 'Active' : 'Inactive'}"></span>
                            </td>
                            <td class="text-nowrap">
                                <a class="btn btn-sm btn-primary" th:href="@{/admin/shipping-locations/edit/{id}(id=${location.id})}">
                                    <i class="bi bi-pencil-square"></i> Edit
                                </a>
                                <form th:action="@{/admin/shipping-locations/delete/{id}(id=${location.id})}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this location?')">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" class="btn btn-sm btn-danger">
                                        <i class="bi bi-trash"></i> Delete
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <th:block layout:fragment="page_js">
        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const initializeShippingLocationsTable = function () {
                    if (!window.jQuery || !jQuery.fn || !jQuery.fn.DataTable) {
                        window.setTimeout(initializeShippingLocationsTable, 180);
                        return;
                    }

                    const tableElement = document.getElementById('shippingLocationsTable');
                    if (!tableElement || jQuery.fn.DataTable.isDataTable(tableElement)) {
                        return;
                    }

                    jQuery(tableElement).DataTable({
                        ordering: true,
                        order: [[1, 'asc'], [2, 'asc']],
                        pageLength: 25,
                        lengthMenu: [
                            [10, 25, 50, 100, -1],
                            [10, 25, 50, 100, 'All']
                        ],
                        autoWidth: false,
                        scrollX: true,
                        layout: {
                            topStart: 'pageLength',
                            topEnd: 'search',
                            bottomStart: 'info',
                            bottomEnd: 'paging'
                        },
                        columnDefs: [
                            {targets: 0, width: '56px', searchable: false},
                            {targets: 7, orderable: false, searchable: false, width: '150px'}
                        ],
                        language: {
                            emptyTable: 'No shipping locations found.',
                            zeroRecords: 'No locations match your search.',
                            info: '_START_ to _END_ of _TOTAL_ locations',
                            infoEmpty: '0 locations',
                            lengthMenu: 'Rows _MENU_'
                        }
                    });
                };

                initializeShippingLocationsTable();
            });
        </script>
    </th:block>
</div>
