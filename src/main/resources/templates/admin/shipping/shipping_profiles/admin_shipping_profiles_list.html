<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment = "main_content">
        <section>
            <div class="row">
                <div class="col-sm-2"><h4>Shipping </h4></div>
                <div class="col-sm-7">   <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="nav-link">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Shipping</li>
                            <li class="breadcrumb-item active" aria-current="page">Shipping Profile List</li>
                        </ol>
                    </nav>
                </div></div>
        </section>
        <hr/>
        <div class="row">
            <div class="col-sm-9">

                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-sm-5 font-weight-bold "><strong> <i class="bi bi-list-task"></i> Shipping Profile List. Total [[${profiles.size()}]]</strong> </div>

                            <div class="col-sm-7 text-end">
                                <div class="btn-group ">
                                    <a class="btn btn-success btn-sm " th:href="@{/admin/shipping-profiles/create}"> <i class="bi bi-plus-circle"></i> Add Shipping Profile </a>
                                    <a th:href="@{/admin/index}" type="button" class="btn  btn-danger btn-sm"> <i class="bi bi-x-circle"></i> Close</a>
                                </div>
                            </div>

                        </div>
                    </div>





                    <div class="card-body table-responsive">
                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Vendor</th>
                                    <th>Name</th>
                                    <th>Type</th>
                                    <th>Allowed Districts</th>
                                    <th>Allowed Carriers</th>
                                    <th>Active</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${profiles}">
                                    <td th:text="${p.id}"></td>
                                    <td th:text="${p.vendorId}"></td>
                                    <td th:text="${p.name}"></td>

                                    <td th:text="${p.type}"></td>

                                    <!-- Display districts nicely -->
                                    <td>
                                        <span th:each="district : ${p.allowedDistricts}" class="badge bg-info me-1" th:text="${district}"></span>
                                    </td>

                                    <!-- Display carriers nicely -->
                                    <td>
                                        <span th:each="carrier : ${p.allowedCarriers}" class="badge bg-success me-1" th:text="${carrier.name}"></span>
                                    </td>
                                    <td th:text="${p.active}"></td>
                                    <td>
                                        <a th:href="@{'/admin/shipping-profiles/edit/' + ${p.id}}" class="btn btn-sm btn-primary">Edit</a>
                                        <a th:href="@{'/admin/shipping-profiles/delete/' + ${p.id}}" class="btn btn-sm btn-danger">Delete</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div><!--  Card  end-->


            </div><!--  Main Content  end-->
            <div class="col-sm-3">
                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-sm-5 font-weight-bold ">  <strong><i class="fas fa-list"></i> Filter</strong> </div>
                        </div>
                    </div>
                    <div class="card-body">
                    </div><!--  Card body end-->
                </div><!--  Card  end-->
            </div>
        </div>   <!--  Layout end-->      </div><!--  Main Content  end-->
</div>
