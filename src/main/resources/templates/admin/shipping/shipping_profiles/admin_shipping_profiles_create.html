<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment = "main_content">
        <section>
            <div class="row">
                <div class="col-sm-2"><h4>Shipping </h4></div>
                <div class="col-sm-7">   <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="nav-link">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Shipping</li>
                            <li class="breadcrumb-item active" aria-current="page">Shipping Profile Create</li>
                        </ol>
                    </nav>
                </div></div>
        </section>




        <div class="row">
            <div class="col-sm-12">

                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-sm-5 font-weight-bold ">
                                <span class="fs-5 fw-bold">  <i class="bi bi-justify"></i>   <span th:text="${profile.id} != null ? 'Edit Profile' : 'Create New Profile'">Form</span>
                                </span>
                            </div>

                            <div class="col-sm-7 text-end">
                                <div class="btn-group ">

                                    <a th:href="@{/admin/shipping-profiles/list}" type="button" class="btn  btn-danger btn-sm"> <i class="bi bi-x-circle"></i> Close</a>
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="card-body">

                        <!-- Global error message -->
                        <div th:if="${formError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${formError}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <form th:action="@{/admin/shipping-profiles/save}" th:object="${profile}" method="post">
                            <input type="hidden" th:field="*{id}"/>
                            <div class="mb-3">
                                <label>Vendor</label>
                                <select th:field="*{vendorId}" class="form-select" required>
                                    <option value="" disabled selected>Select Vendor</option>
                                    <option th:each="vendor : ${vendors}" th:value="${vendor.id}" th:text="${vendor.companyName}"
                                            th:selected="${profile.vendorId != null} ? ${profile.vendorId == vendor.id} : false"></option>
                                </select>
                                <div class="text-danger" th:if="${#fields.hasErrors('vendorId')}" th:errors="*{vendorId}"></div>
                            </div>
                            <div class="mb-2"><label  class="form-label">Name</label>
                                <input th:field="*{name}" class="form-control" placeholder="Profile Name"/></div>
                            <div class="mb-2">
                                <label  class="form-label">Type</label>
                                <select th:field="*{type}" class="form-select">
                                    <option value="" disabled>Select Type</option>
                                    <option th:value="Shipping_From" th:text="'Shipping_From'"></option>
                                    <option th:value="DESTINATION" th:text="'DESTINATION'"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label  class="form-label">Allowed Carriers</label>
                                <select th:field="*{allowedCarriers}" multiple class="form-select">
                                    <option th:each="carrier : ${carriers}" th:value="${carrier.id}"
                                            th:text="${carrier.name}"
                                            th:selected="${profile.allowedCarriers != null} ? ${profile.allowedCarriers.contains(carrier)} : false">
                                    </option>
                                </select>
                                <small class="form-text text-muted">Hold Ctrl (Cmd) to select multiple carriers</small>
                            </div>

                            <div class="mb-3">
                                <label  class="form-label">Allowed Locations</label>
                                <div class="form-check" th:each="location : ${allDistricts}">
                                    <input class="form-check-input" type="checkbox"
                                           th:value="${location.id}"
                                           th:field="*{allowedDistricts}"
                                           th:checked="${profile.allowedDistricts != null} ? ${profile.allowedDistricts.contains(location)} : false">
                                    <label class="form-check-label" th:text="${location.type + ' - ' + location.displayLabel}"></label>
                                </div>
                            </div>
                            <div class="mb-2 form-check">
                                <input type="checkbox" th:field="*{active}" class="form-check-input"/> Active
                            </div>
                            <button class="btn btn-primary">Save</button>
                        </form>


                    </div><!--  Card body end-->
                </div><!--  Card  end-->
            </div><!--  Main Content  end-->
        </div>
    </div>
</div>   <!--  Layout end-->
