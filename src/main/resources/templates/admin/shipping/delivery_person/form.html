<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-1">
                        <i class="bi bi-person-plus me-2 text-primary"></i>
                        <span th:text="${deliveryPerson.id != null ? 'Edit Delivery Person' : 'Add Delivery Person'}">Add Delivery Person</span>
                    </h4>
                    <div class="text-muted small">Assign delivery staff to a vendor and control availability.</div>
                </div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a th:href="@{/admin/index}" class="nav-link"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="breadcrumb-item"><a th:href="@{/delivery-person}" class="nav-link">Delivery Persons</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Form</li>
                    </ol>
                </nav>
            </div>
        </section>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>Delivery Person Details</strong>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/delivery-person}">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </a>
            </div>
            <div class="card-body">
                <form th:action="@{/delivery-person/save}" th:object="${deliveryPerson}" method="post" class="row g-3">
                    <input type="hidden" th:field="*{id}">
                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="col-md-6">
                        <label class="form-label" for="vendorId">Vendor</label>
                        <select class="form-select" id="vendorId" th:field="*{vendorId}" required>
                            <option value="">Select vendor</option>
                            <option th:each="vendor : ${vendorList}"
                                    th:value="${vendor.id}"
                                    th:text="${!#strings.isEmpty(vendor.companyName) ? vendor.companyName + ' - ' + vendor.vendorCode : vendor.vendorCode}">
                                Vendor
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="name">Name</label>
                        <input class="form-control" id="name" th:field="*{name}" required placeholder="Delivery person name">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label" for="phone">Phone</label>
                        <input class="form-control" id="phone" th:field="*{phone}" required placeholder="Phone number">
                    </div>

                    <div class="col-md-6 d-flex align-items-end">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="active" th:field="*{active}">
                            <label class="form-check-label" for="active">Active for delivery assignment</label>
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-end gap-2">
                        <a th:href="@{/delivery-person}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
