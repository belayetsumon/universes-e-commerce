<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4 d-flex justify-content-between align-items-center">
            <div>
                <h4 class="mb-1"><i class="bi bi-pin-map me-2 text-primary"></i>Pickup Addresses</h4>
                <div class="text-muted small">Vendor pickup points for carrier handover.</div>
            </div>
            <a class="btn btn-success btn-sm" th:href="@{/admin/pickup-addresses/create}"><i class="bi bi-plus-circle"></i> Add Pickup</a>
        </section>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
        <div class="card"><div class="card-body table-responsive">
            <table class="table table-bordered table-striped table-sm align-middle">
                <thead><tr><th>#</th><th>Vendor</th><th>Name</th><th>Contact</th><th>Location</th><th>Default</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(addresses)}"><td colspan="8" class="text-center text-muted">No pickup addresses found.</td></tr>
                    <tr th:each="a, stat : ${addresses}">
                        <td th:text="${stat.count}"></td>
                        <td th:text="${a.vendorId}"></td>
                        <td><span class="fw-semibold" th:text="${a.name}"></span><small class="d-block text-muted" th:text="${a.addressLine}"></small></td>
                        <td><span th:text="${a.contactPerson}"></span><small class="d-block text-muted" th:text="${a.phone}"></small></td>
                        <td th:text="${a.district != null ? a.district.displayLabel : '-'}"></td>
                        <td><span class="badge" th:classappend="${a.defaultAddress} ? ' bg-primary' : ' bg-light text-dark'" th:text="${a.defaultAddress ? 'Default' : 'No'}"></span></td>
                        <td><span class="badge" th:classappend="${a.active} ? ' bg-success' : ' bg-secondary'" th:text="${a.active ? 'Active' : 'Inactive'}"></span></td>
                        <td>
                            <a class="btn btn-sm btn-primary" th:href="@{/admin/pickup-addresses/edit/{id}(id=${a.id})}">Edit</a>
                            <form class="d-inline" method="post" th:action="@{/admin/pickup-addresses/delete/{id}(id=${a.id})}" onsubmit="return confirm('Delete this pickup address?')">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div></div>
    </div>
</div>
