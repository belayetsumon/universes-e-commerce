<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment = "main_content">


        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h4><i class="bi bi-person-badge-fill me-2 text-primary"></i>Carrier Management</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#" class="nav-link"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Carrier Rate List</li>
                    </ol>
                </nav>
            </div>
        </section>
        <div class="row">
            <div class="col-sm-12">

                <div class="card">
                    <div class="card-header">

                        <div class="row">
                            <div class="col-sm-5 font-weight-bold "><strong> <i class="bi bi-list-task"></i> Carrier Rate  List. Total: [[${rates.size()}]]</strong> </div>

                            <div class="col-sm-7 text-end">
                                <div class="btn-group ">
                                    <a class="btn btn-success btn-sm " th:href="@{/admin/carrier-rates/create}"> <i class="bi bi-plus-circle"></i> Add New Rate </a>
                                    <a th:href="@{/admin/index}" type="button" class="btn  btn-danger btn-sm"> <i class="bi bi-x-circle"></i> Close</a>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="card-body">

                        <!-- Success message -->
                        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${successMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <!-- Error message -->
                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <div class="table-responsive">
                            <table class="table table-striped table-bordered">
                                <thead>
                                    <tr>
                                        <th>ID</th><th>Carrier</th><th>District</th><th>Speed</th><th>Delivery Type</th>
                                        <th>Base</th><th>/Kg</th>
                                        <!--                                        <th>/Km</th>-->
                                        <th>COD Fee</th><th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="r ,status: ${rates}">
                                        <td th:text="${status.count}"></td>
                                        <td th:text="${r.carrier != null ? r.carrier.name : '—'}"></td>
                                        <td th:text="${r.district}"></td>
                                        <td th:text="${r.speed}"></td>
                                        <td th:text="${r.deliveryType}"></td>
                                        <td th:text="${r.basePrice}"></td>
                                        <td th:text="${r.perKg}"></td>
                                        <!--                                        <td th:text="${r.perKm}"></td>-->
                                        <td th:text="${r.codFee}"></td>
                                        <td>
                                            <a th:href="@{'/admin/carrier-rates/edit/' + ${r.id}}" class="btn btn-sm btn-primary">Edit</a>
                                            <a th:href="@{'/admin/carrier-rates/delete/' + ${r.id}}" class="btn btn-sm btn-danger"
                                               onclick="return confirm('Delete rate?')">Delete</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>

                        </div>
                    </div><!--  Card body end-->
                </div><!--  Card  end-->
            </div><!--  Main Content  end-->
        </div>
    </div>
</div>   <!--  Layout end-->
