<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">

        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                <div>
                    <h4 class="mb-1">
                        <i class="bi bi-layers me-2 text-primary"></i>
                        <span th:text="${slab.id} != null ? 'Edit Rate Slab' : 'Create Rate Slab'">Rate Slab</span>
                    </h4>
                    <div class="text-muted small">Set a fixed shipping price for a weight range.</div>
                </div>
                <a th:href="@{/admin/carrier-rates/list}" type="button" class="btn btn-danger btn-sm">
                    <i class="bi bi-x-circle"></i> Close
                </a>
            </div>
        </section>

        <div class="card">
            <div class="card-header">
                <strong><i class="bi bi-sliders"></i> Slab Details</strong>
            </div>
            <div class="card-body">
                <form th:action="@{/admin/carrier-rate-slabs/save}" th:object="${slab}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-12">
                            <label class="form-label">Carrier Rate</label>
                            <select th:field="*{carrierRate}" class="form-select" required>
                                <option value="">Select rate</option>
                                <option th:each="r : ${rates}"
                                        th:value="${r.id}"
                                        th:text="${(r.carrier != null ? r.carrier.name : 'Carrier') + ' - ' + (r.zone != null ? r.zone.name : 'Direct districts') + ' - ' + r.speed}">
                                </option>
                            </select>
                            <div class="text-danger small" th:if="${#fields.hasErrors('carrierRate')}" th:errors="*{carrierRate}"></div>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Min Weight (Kg)</label>
                            <input type="number" min="0" step="0.01" th:field="*{minWeight}" class="form-control" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('minWeight')}" th:errors="*{minWeight}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Max Weight (Kg)</label>
                            <input type="number" min="0.01" step="0.01" th:field="*{maxWeight}" class="form-control"/>
                            <div class="form-text">Leave blank for open-ended top range.</div>
                            <div class="text-danger small" th:if="${#fields.hasErrors('maxWeight')}" th:errors="*{maxWeight}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Price</label>
                            <input type="number" min="0" step="0.01" th:field="*{price}" class="form-control" required/>
                            <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Priority</label>
                            <input type="number" min="0" th:field="*{priority}" class="form-control"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Active</label>
                            <div class="form-check mt-2">
                                <input type="checkbox" th:field="*{active}" class="form-check-input" id="slabActive"/>
                                <label class="form-check-label" for="slabActive">Enabled</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <a th:href="@{/admin/carrier-rates/list}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> Save Slab
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
