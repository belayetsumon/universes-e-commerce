<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment = "main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h4><i class="bi bi-person-badge-fill me-2 text-primary"></i> Carriers Management</h4>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-0">
                        <li class="breadcrumb-item"><a href="#" class="nav-link"><i class="bi bi-house-door"></i> Home</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Vendor Payout Request List</li>
                    </ol>
                </nav>
            </div>
        </section>

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="font-weight-bold mb-0" th:text="${carrier.id != null ? 'Edit Carrier' : 'New Carrier'}">
                            <i class="bi bi-list-task"></i> Carriers Management

                        </h5>
                        <div class="btn-group">
                            <a th:href="@{/admin/carriers/list}" type="button" class="btn  btn-danger btn-sm"> <i class="bi bi-x-circle"></i> Close</a>
                            <!-- Example: add more buttons here -->
                            <!--
                            <a class="btn btn-primary btn-sm" href="#">Another Action</a>
                            -->
                        </div>
                    </div>
                    <div class="card-body">
                        <div th:if="${not #strings.isEmpty(successMessage)}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <span th:text="${successMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                        <div th:if="${not #strings.isEmpty(errorMessage)}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <form th:action="@{/admin/carriers/save}" th:object="${carrier}" method="post">
                            <input type="hidden" th:field="*{id}"/>
                            <!--                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />-->

                            <div class="mb-2">
                                <label class="form-label"> Carrier Name</label>
                                <input th:field="*{name}" class="form-control" placeholder="Name" required="true"/>
                                <div th:if="${#fields.hasErrors('name')}" class="text-danger"
                                     th:errors="*{name}">Name Error</div>
                            </div>

                            <div class="mb-2">
                                <label class="form-label"> Carrier Code</label>
                                <input th:field="*{code}" class="form-control" placeholder="Code" required="true"/>
                                <div th:if="${#fields.hasErrors('code')}" class="text-danger"
                                     th:errors="*{code}">Name Error</div>
                            </div>


                            <div class="mb-2">
                                <label class="form-label">Carrier API Key</label>
                                <input th:field="*{apiKey}" class="form-control" placeholder="API Key"/></div>

                            <div class="mb-2">
                                <label class="form-label">Delivery Mode</label>
                                <!-- 2026-04-22: Carrier mode lets admin choose third-party, vendor self-delivery, vendor rider, or pickup. -->
                                <select th:field="*{mode}" class="form-select">
                                    <option th:each="mode : ${carrierModes}" th:value="${mode}" th:text="${#strings.replace(mode.name(), '_', ' ')}"></option>
                                </select>
                            </div>

                            <div class="mb-2">
                                <label class="form-label">Json</label>

                                <textarea th:field="*{configJson}" class="form-control" placeholder="Config JSON"></textarea></div>

                            <div class="row">
                                <div class="col-md-4 mb-2 form-check">
                                    <input type="checkbox" th:field="*{requiresApi}" class="form-check-input"/>
                                    <label class="form-check-label">Requires API</label>
                                </div>
                                <div class="col-md-4 mb-2 form-check">
                                    <input type="checkbox" th:field="*{trackable}" class="form-check-input"/>
                                    <label class="form-check-label">Trackable</label>
                                </div>
                                <div class="col-md-4 mb-2 form-check">
                                    <input type="checkbox" th:field="*{supportsCod}" class="form-check-input"/>
                                    <label class="form-check-label">Supports COD</label>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-2">
                                    <label class="form-label">Settlement Mode</label>
                                    <select th:field="*{settlementMode}" class="form-select">
                                        <option th:each="mode : ${settlementModes}" th:value="${mode}" th:text="${#strings.replace(mode.name(), '_', ' ')}"></option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="form-label">Shipping Charge Owner</label>
                                    <select th:field="*{shippingChargeOwner}" class="form-select">
                                        <option th:each="owner : ${shippingChargeOwners}" th:value="${owner}" th:text="${#strings.replace(owner.name(), '_', ' ')}"></option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="form-label">COD Collection Mode</label>
                                    <select th:field="*{codCollectionMode}" class="form-select">
                                        <option th:each="mode : ${codCollectionModes}" th:value="${mode}" th:text="${#strings.replace(mode.name(), '_', ' ')}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-2 form-check">
                                <label class="form-label">Status</label>

                                <input type="checkbox" th:field="*{active}" class="form-check-input"/> Active
                            </div>
                            <button class="btn btn-primary">Save</button>
                        </form>

                    </div>
                </div>


            </div>
        </div><!--  Card body end-->
    </div><!--  Card  end-->
</div>
