<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4 d-flex justify-content-between align-items-center"><h4 class="mb-0">Create Shipping Manifest</h4><a class="btn btn-danger btn-sm" th:href="@{/admin/shipping-documents/manifests}">Close</a></section>
        <div class="card"><div class="card-body"><form th:action="@{/admin/shipping-documents/manifests/save}" th:object="${manifest}" method="post" class="row g-3">
            <div class="col-md-4"><label class="form-label">Manifest Number</label><input th:field="*{manifestNumber}" class="form-control" placeholder="Auto if blank"/></div>
            <div class="col-md-4"><label class="form-label">Carrier</label><select th:field="*{carrier}" class="form-select"><option value="">Select carrier</option><option th:each="c : ${carriers}" th:value="${c.id}" th:text="${c.name}"></option></select></div>
            <div class="col-md-4 form-check mt-4"><input th:field="*{closed}" class="form-check-input" type="checkbox" id="closed"/><label for="closed" class="form-check-label">Closed/Handover complete</label></div>
            <div class="col-12"><label class="form-label">Shipments</label><select name="shipmentIds" class="form-select" multiple size="10"><option th:each="s : ${shipments}" th:value="${s.id}" th:text="${'Shipment #' + s.id + ' / Order ' + s.salesOrderId}"></option></select></div>
            <div class="col-12 text-end"><button class="btn btn-primary" type="submit">Save</button></div>
        </form></div></div>
    </div>
</div>
