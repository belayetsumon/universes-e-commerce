<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4 d-flex justify-content-between align-items-center"><h4 class="mb-0">Create Shipping Label</h4><a class="btn btn-danger btn-sm" th:href="@{/admin/shipping-documents/labels}">Close</a></section>
        <div class="card"><div class="card-body"><form th:action="@{/admin/shipping-documents/labels/save}" th:object="${label}" method="post" class="row g-3">
            <div class="col-md-4"><label class="form-label">Shipment</label><select th:field="*{shipment}" class="form-select" required><option value="">Select shipment</option><option th:each="s : ${shipments}" th:value="${s.id}" th:text="${'Shipment #' + s.id + ' / Order ' + s.salesOrderId}"></option></select></div>
            <div class="col-md-4"><label class="form-label">Label Number</label><input th:field="*{labelNumber}" class="form-control" placeholder="Auto if blank"/></div>
            <div class="col-md-4"><label class="form-label">Label URL</label><input th:field="*{labelUrl}" class="form-control"/></div>
            <div class="col-12"><label class="form-label">Payload</label><textarea th:field="*{labelPayload}" class="form-control" rows="4"></textarea></div>
            <div class="col-md-3 form-check ms-2"><input th:field="*{active}" class="form-check-input" type="checkbox" id="active"/><label for="active" class="form-check-label">Active</label></div>
            <div class="col-12 text-end"><button class="btn btn-primary" type="submit">Save</button></div>
        </form></div></div>
    </div>
</div>
