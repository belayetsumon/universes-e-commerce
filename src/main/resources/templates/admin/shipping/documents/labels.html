<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4 d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-upc-scan me-2 text-primary"></i>Shipping Labels</h4>
            <a class="btn btn-success btn-sm" th:href="@{/admin/shipping-documents/labels/create}">Add Label</a>
        </section>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div class="card"><div class="card-body table-responsive"><table class="table table-bordered table-sm align-middle">
            <thead><tr><th>#</th><th>Shipment</th><th>Label Number</th><th>URL</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(labels)}"><td colspan="6" class="text-center text-muted">No labels found.</td></tr>
                <tr th:each="l, stat : ${labels}">
                    <td th:text="${stat.count}"></td><td th:text="${l.shipment != null ? l.shipment.id : '-'}"></td><td th:text="${l.labelNumber}"></td><td><a th:if="${l.labelUrl != null and !#strings.isEmpty(l.labelUrl)}" th:href="${l.labelUrl}" target="_blank" th:text="${l.labelUrl}"></a><span th:if="${l.labelUrl == null or #strings.isEmpty(l.labelUrl)}">-</span></td>
                    <td><span class="badge" th:classappend="${l.active} ? ' bg-success' : ' bg-secondary'" th:text="${l.active ? 'Active' : 'Inactive'}"></span></td>
                    <td><form method="post" th:action="@{/admin/shipping-documents/labels/delete/{id}(id=${l.id})}" onsubmit="return confirm('Delete this label?')"><input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" /><button class="btn btn-sm btn-danger">Delete</button></form></td>
                </tr>
            </tbody>
        </table></div></div>
    </div>
</div>
