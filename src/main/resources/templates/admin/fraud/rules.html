<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <th:block layout:fragment="page_css">
        <link rel="stylesheet" th:href="@{/assets/admin/css/fraud-admin.css}">
    </th:block>

    <main layout:fragment="main_content" class="main-content container-fluid px-3 py-3 fraud-admin-page">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <header class="card shadow-sm mb-4 fraud-hero">
            <div class="card-body">
                <div class="d-flex align-items-center justify-content-between gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <span class="fraud-hero-icon"><i class="bi bi-sliders fs-4"></i></span>
                        <div>
                            <h1>Fraud Rules</h1>
                            <p class="fraud-hero-copy">Configure scoring, hard-block, COD, promotion, referral, post-order, and vendor controls.</p>
                        </div>
                    </div>
                    <a class="btn btn-light btn-sm" th:href="@{/admin/fraud/rules/new}"><i class="bi bi-plus-lg me-1"></i>New Rule</a>
                </div>
            </div>
        </header>

        <form class="fraud-panel shadow-sm p-3 mb-3" method="get" th:action="@{/admin/fraud/rules}" th:object="${filter}">
            <div class="fraud-filter-grid">
                <input class="form-control" type="search" th:field="*{q}" placeholder="Search">
                <select class="form-select" th:field="*{ruleType}">
                    <option value="">Rule type</option>
                    <option th:each="type : ${ruleTypes}" th:value="${type}" th:text="${type}">SCORING</option>
                </select>
                <select class="form-select" th:field="*{active}">
                    <option value="">Status</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="fraud-action-bar mt-3">
                <button class="btn btn-primary btn-sm" type="submit"><i class="bi bi-funnel me-1"></i>Filter</button>
                <a class="btn btn-light btn-sm" th:href="@{/admin/fraud/rules}">Reset</a>
            </div>
        </form>

        <section class="fraud-panel shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0 fraud-table">
                    <thead><tr><th>Priority</th><th>Rule</th><th>Type</th><th>Signal</th><th>Operator</th><th>Score</th><th>Action</th><th>Status</th><th></th></tr></thead>
                    <tbody>
                        <tr th:each="rule : ${rules.content}">
                            <td th:text="${rule.priority}">100</td>
                            <td><div class="fw-semibold" th:text="${rule.ruleCode}">CODE</div><div class="small text-muted" th:text="${rule.ruleName}">Name</div></td>
                            <td th:text="${rule.ruleType}">SCORING</td>
                            <td th:text="${rule.signalCode} ?: '-'">-</td>
                            <td th:text="${rule.operator} ?: '-'">-</td>
                            <td th:text="${rule.scoreImpact}">0</td>
                            <td th:text="${rule.action} ?: '-'">-</td>
                            <td><span class="fraud-chip" th:classappend="${rule.active} ? ' fraud-chip-active' : ' fraud-chip-inactive'" th:text="${rule.active ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</span></td>
                            <td class="text-end">
                                <div class="btn-group btn-group-sm">
                                    <a class="btn btn-light" th:href="@{/admin/fraud/rules/{id}/edit(id=${rule.id})}"><i class="bi bi-pencil"></i></a>
                                    <form method="post" th:action="@{/admin/fraud/rules/{id}/status(id=${rule.id})}">
                                        <input type="hidden" th:name="${fraudCsrfParameterName}" th:value="${fraudCsrfToken}">
                                        <input type="hidden" name="active" th:value="${!rule.active}">
                                        <button class="btn btn-light" type="submit" th:title="${rule.active ? 'Deactivate' : 'Activate'}">
                                            <i class="bi" th:classappend="${rule.active} ? ' bi-pause-circle' : ' bi-play-circle'"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(rules.content)}"><td colspan="9"><div class="fraud-empty">No rules found</div></td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
