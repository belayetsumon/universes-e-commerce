<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <th:block layout:fragment="page_css">
        <link rel="stylesheet" th:href="@{/assets/admin/css/fraud-admin.css}">
    </th:block>

    <main layout:fragment="main_content" class="main-content container-fluid px-3 py-3 fraud-admin-page">
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <header class="card shadow-sm mb-4 fraud-hero">
            <div class="card-body">
                <div class="d-flex align-items-center justify-content-between gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <span class="fraud-hero-icon"><i class="bi bi-person-badge fs-4"></i></span>
                        <div>
                            <h1>Manual Fraud Review</h1>
                            <p class="fraud-hero-copy" th:text="${'Assessment #' + assessment.id + ' / Order #' + assessment.orderId}">Assessment</p>
                        </div>
                    </div>
                    <a class="btn btn-outline-light btn-sm" th:href="@{/admin/fraud/assessments/{id}(id=${assessment.id})}">Assessment Detail</a>
                </div>
            </div>
        </header>

        <div class="fraud-detail-grid">
            <section class="fraud-panel shadow-sm p-3">
                <h2 class="h6 mb-3">Decision</h2>
                <form method="post" th:action="@{/admin/fraud/assessments/{id}/review(id=${assessment.id})}">
                    <input type="hidden" th:name="${fraudCsrfParameterName}" th:value="${fraudCsrfToken}">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Reason</label>
                            <input class="form-control" name="reason" required maxlength="500">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Correlation ID</label>
                            <input class="form-control" name="correlationId" th:value="${assessment.correlationId}" maxlength="120">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" name="notes" rows="5" maxlength="2000"></textarea>
                        </div>
                    </div>
                    <div class="fraud-action-bar mt-3">
                        <button class="btn btn-success" name="action" value="approve" type="submit"><i class="bi bi-check2 me-1"></i>Approve Order</button>
                        <button class="btn btn-warning" name="action" value="verify" type="submit"><i class="bi bi-phone me-1"></i>Request OTP</button>
                        <button class="btn btn-secondary" name="action" value="hold" type="submit"><i class="bi bi-pause-circle me-1"></i>Hold</button>
                        <button class="btn btn-danger" name="action" value="reject" type="submit"><i class="bi bi-x-octagon me-1"></i>Reject Order</button>
                    </div>
                </form>
            </section>

            <aside class="fraud-panel shadow-sm p-3">
                <h2 class="h6 mb-3">Assessment Snapshot</h2>
                <div class="fraud-kv">
                    <div class="fraud-kv-item"><div class="fraud-kv-label">Risk</div><div class="fraud-kv-value" th:text="${assessment.riskLevel}">HIGH</div></div>
                    <div class="fraud-kv-item"><div class="fraud-kv-label">Score</div><div class="fraud-kv-value" th:text="${assessment.riskScore}">70</div></div>
                    <div class="fraud-kv-item"><div class="fraud-kv-label">Decision</div><div class="fraud-kv-value" th:text="${assessment.decision}">HOLD</div></div>
                    <div class="fraud-kv-item"><div class="fraud-kv-label">Status</div><div class="fraud-kv-value" th:text="${assessment.status}">MANUAL</div></div>
                </div>
            </aside>
        </div>

        <div class="row g-3 mt-1">
            <div class="col-xl-8">
                <section class="fraud-panel shadow-sm">
                    <div class="border-bottom p-3"><h2 class="h6 mb-0">Signals</h2></div>
                    <div class="table-responsive fraud-scroll-table">
                        <table class="table table-hover mb-0 fraud-table">
                            <thead><tr><th>Signal</th><th>Value</th><th>Score</th><th>Severity</th><th>Reason</th></tr></thead>
                            <tbody>
                                <tr th:each="signal : ${signals}" th:if="${signal.triggered}">
                                    <td th:text="${signal.signalCode}">SIGNAL</td>
                                    <td th:text="${signal.signalValue} ?: '-'">-</td>
                                    <td th:text="${signal.scoreImpact}">0</td>
                                    <td th:text="${signal.severity}">HIGH</td>
                                    <td th:text="${signal.reasonCode} ?: '-'">-</td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(signals)}"><td colspan="5"><div class="fraud-empty">No signals available</div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
            <div class="col-xl-4">
                <section class="fraud-panel shadow-sm p-3">
                    <h2 class="h6 mb-3">Create Blocklist Entry</h2>
                    <form method="post" th:action="@{/admin/fraud/assessments/{id}/blocklist(id=${assessment.id})}" th:object="${blocklistRequest}">
                        <input type="hidden" th:name="${fraudCsrfParameterName}" th:value="${fraudCsrfToken}">
                        <div class="mb-2">
                            <label class="form-label">Type</label>
                            <select class="form-select" th:field="*{blockType}" required>
                                <option value="">Select</option>
                                <option th:each="type : ${blockTypes}" th:value="${type}" th:text="${type}">DEVICE</option>
                            </select>
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Value</label>
                            <input class="form-control" th:field="*{blockValue}" required maxlength="500">
                        </div>
                        <div class="mb-2">
                            <label class="form-label">Scope</label>
                            <select class="form-select" th:field="*{scope}">
                                <option th:each="scope : ${blockScopes}" th:value="${scope}" th:text="${scope}">GLOBAL</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Reason</label>
                            <textarea class="form-control" th:field="*{reason}" required maxlength="500" rows="3"></textarea>
                        </div>
                        <button class="btn btn-dark btn-sm" type="submit"><i class="bi bi-shield-lock me-1"></i>Save Block</button>
                    </form>
                </section>
            </div>
        </div>
    </main>
</div>
