<div xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="admin-layout">
    <th:block layout:fragment="page_css">
        <link rel="stylesheet" th:href="@{/assets/admin/css/fraud-admin.css}">
    </th:block>

    <main layout:fragment="main_content" class="main-content container-fluid px-3 py-3 fraud-admin-page">
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <header class="card shadow-sm mb-4 fraud-hero">
            <div class="card-body">
                <div class="d-flex align-items-center justify-content-between gap-3">
                    <div class="d-flex align-items-center gap-3">
                        <span class="fraud-hero-icon"><i class="bi bi-shield-lock fs-4"></i></span>
                        <div>
                            <h1>Fraud Blocklist</h1>
                            <p class="fraud-hero-copy">Maintain active customer, device, address, IP, payment, vendor, product, and referral blocks.</p>
                        </div>
                    </div>
                    <a class="btn btn-light btn-sm" th:href="@{/admin/fraud/blocklist/new}"><i class="bi bi-plus-lg me-1"></i>New Block</a>
                </div>
            </div>
        </header>

        <form class="fraud-panel shadow-sm p-3 mb-3" method="get" th:action="@{/admin/fraud/blocklist}" th:object="${filter}">
            <div class="fraud-filter-grid">
                <input class="form-control" type="search" th:field="*{q}" placeholder="Search masked value or reason">
                <select class="form-select" th:field="*{blockType}">
                    <option value="">Block type</option>
                    <option th:each="type : ${blockTypes}" th:value="${type}" th:text="${type}">DEVICE</option>
                </select>
                <select class="form-select" th:field="*{active}">
                    <option value="">Status</option>
                    <option value="true">Active</option>
                    <option value="false">Inactive</option>
                </select>
            </div>
            <div class="fraud-action-bar mt-3">
                <button class="btn btn-primary btn-sm" type="submit"><i class="bi bi-funnel me-1"></i>Filter</button>
                <a class="btn btn-light btn-sm" th:href="@{/admin/fraud/blocklist}">Reset</a>
            </div>
        </form>

        <section class="fraud-panel shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover mb-0 fraud-table">
                    <thead><tr><th>Type</th><th>Masked value</th><th>Scope</th><th>Reason</th><th>Temporary</th><th>Expires</th><th>Status</th><th></th></tr></thead>
                    <tbody>
                        <tr th:each="entry : ${blocklist.content}">
                            <td th:text="${entry.blockType}">DEVICE</td>
                            <td class="font-monospace" th:text="${entry.maskedValue}">****1234</td>
                            <td th:text="${entry.scope}">GLOBAL</td>
                            <td th:text="${entry.reason}">Reason</td>
                            <td th:text="${entry.temporary}">false</td>
                            <td th:text="${entry.expiresAt != null ? #temporals.format(entry.expiresAt, 'yyyy-MM-dd HH:mm') : '-'}">-</td>
                            <td><span class="fraud-chip" th:classappend="${entry.active} ? ' fraud-chip-active' : ' fraud-chip-inactive'" th:text="${entry.active ? 'ACTIVE' : 'INACTIVE'}">ACTIVE</span></td>
                            <td class="text-end">
                                <form method="post" th:action="@{/admin/fraud/blocklist/{id}/status(id=${entry.id})}" class="d-inline-flex gap-1">
                                    <input type="hidden" th:name="${fraudCsrfParameterName}" th:value="${fraudCsrfToken}">
                                    <input type="hidden" name="active" th:value="${!entry.active}">
                                    <input type="hidden" name="reason" value="Admin status update">
                                    <button class="btn btn-sm btn-light" type="submit" th:title="${entry.active ? 'Deactivate' : 'Activate'}">
                                        <i class="bi" th:classappend="${entry.active} ? ' bi-pause-circle' : ' bi-play-circle'"></i>
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(blocklist.content)}"><td colspan="8"><div class="fraud-empty">No blocklist entries found</div></td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
