<div xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-4">
            <div class="d-flex justify-content-between align-items-center">
                <h4><i class="bi bi-arrow-left-circle me-2 text-primary"></i>Refund Report</h4>
                <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/finance/returns}">Return Report</a>
            </div>
        </section>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="card"><div class="card-body"><strong>Refund Rows</strong><div class="fs-5" th:text="${report.totalReturnRows}">0</div></div></div></div>
            <div class="col-md-4"><div class="card"><div class="card-body"><strong>Total Refunded</strong><div class="fs-5" th:text="${report.totalRefundAmount}">0.00</div></div></div></div>
            <div class="col-md-4"><div class="card"><div class="card-body"><strong>Returned Items</strong><div class="fs-5" th:text="${report.returnedCount}">0</div></div></div></div>
        </div>

        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <strong>Filters</strong>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/finance/refunds}">Reset</a>
            </div>
            <div class="card-body">
                <form class="row g-3 align-items-end" method="get" th:action="@{/admin/finance/refunds}">
                    <div class="col-md-4"><label class="form-label" for="fromDate">From Date</label><input class="form-control" type="date" id="fromDate" name="fromDate" th:value="${fromDate}"></div>
                    <div class="col-md-4"><label class="form-label" for="toDate">To Date</label><input class="form-control" type="date" id="toDate" name="toDate" th:value="${toDate}"></div>
                    <div class="col-md-4"><button class="btn btn-primary w-100" type="submit">Apply Filter</button></div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><strong>Refund Details</strong></div>
            <div class="card-body table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead><tr><th>#</th><th>Refund Date</th><th>Order</th><th>Customer</th><th>Vendor</th><th>Product</th><th>Qty</th><th>Item Total</th><th>Refund</th><th>Remarks</th></tr></thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(report.rows)}"><td colspan="10" class="text-center">No refund records found.</td></tr>
                        <tr th:each="row, stat : ${report.rows}">
                            <td th:text="${stat.count}">1</td>
                            <td th:text="${row.returnedAt != null ? row.returnedAt : row.returnRequestedAt}">-</td>
                            <td><a th:if="${row.orderId != null}" th:href="@{/admin-customer/order-details/{oid}(oid=${row.orderId})}" th:text="${row.orderCode}">ORD</a></td>
                            <td><span th:text="${row.customerName}">Customer</span><div class="text-muted small" th:text="${row.customerEmail}">email</div></td>
                            <td th:text="${row.vendorName}">Vendor</td>
                            <td><span th:text="${row.productTitle}">Product</span><div class="text-muted small" th:if="${not #strings.isEmpty(row.variantSummary)}" th:text="${row.variantSummary}">Variant</div></td>
                            <td th:text="${row.quantity}">0</td>
                            <td th:text="${row.itemTotal}">0.00</td>
                            <td class="fw-semibold" th:text="${row.refundAmount}">0.00</td>
                            <td th:text="${not #strings.isEmpty(row.processedRemark) ? row.processedRemark : row.requestRemark}">-</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
