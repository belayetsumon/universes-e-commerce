<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section>
            <div class="row">
                <div class="col-sm-3"><h4> Promotion Engine </h4></div>
                <div class="col-sm-5">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="nav-link">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Promotions</li>
                            <li class="breadcrumb-item active" aria-current="page">Coupons</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </section>
        <hr/>

        <div class="card">
            <div class="card-header">
                <div class="row">
                    <div class="col-sm-6 font-weight-bold">
                        <strong><i class="bi bi-ticket-perforated"></i> Coupon Form</strong>
                    </div>
                    <div class="col-sm-6 text-end">
                        <a class="btn btn-secondary btn-sm" th:href="@{/coupon/list}">
                            <i class="bi bi-arrow-left"></i> Back
                        </a>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <form th:action="@{/coupon/save}" method="post" th:object="${coupon}">
                    <input type="hidden" th:field="*{id}"/>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Title</label>
                            <input type="text" class="form-control" th:field="*{title}" required/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Code</label>
                            <input type="text" class="form-control" th:field="*{code}" required/>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">Description</label>
                            <input type="text" class="form-control" th:field="*{description}"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Type</label>
                            <select class="form-select" th:field="*{type}">
                                <option th:each="t:${couponTypes}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Value</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{value}" required/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Maximum Discount</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{maxDiscount}"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Minimum Order</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{minimumOrder}"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Usage Limit (0 = unlimited)</label>
                            <input type="number" class="form-control" th:field="*{usageLimit}"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Per User Limit</label>
                            <input type="number" class="form-control" th:field="*{perUserUsageLimit}"/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Times Used</label>
                            <input type="number" class="form-control" th:field="*{timesUsed}" readonly/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Start Date</label>
                            <input type="datetime-local" class="form-control" th:field="*{startDate}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Expiry Date</label>
                            <input type="datetime-local" class="form-control" th:field="*{expiryDate}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Status</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:each="s:${couponStatuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Campaign Scope</label>
                            <input type="text" class="form-control" th:field="*{campaignScope}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Vendor Scope</label>
                            <input type="text" class="form-control" th:field="*{vendorScope}"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Stackable</label>
                            <select class="form-select" th:field="*{stackable}">
                                <option th:value="false">false</option>
                                <option th:value="true">true</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">New Customer Only</label>
                            <select class="form-select" th:field="*{newCustomerOnly}">
                                <option th:value="false">false</option>
                                <option th:value="true">true</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">First Order Only</label>
                            <select class="form-select" th:field="*{firstOrderOnly}">
                                <option th:value="false">false</option>
                                <option th:value="true">true</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-save"></i> Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
