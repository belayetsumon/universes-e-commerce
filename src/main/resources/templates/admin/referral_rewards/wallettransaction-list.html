<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">

    <div layout:fragment="main_content">
        <section>
            <div class="row">
                <div class="col-sm-3"><h4>Referral Rewards</h4></div>
                <div class="col-sm-5">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="nav-link">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Referral Rewards</li>
                            <li class="breadcrumb-item active" aria-current="page">Reward Transaction</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </section>
        <hr/>
        <div class="row">
            <div class="col-sm-9">

                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-sm-5 font-weight-bold">
                                <strong><i class="bi bi-list-task"></i> Reward Transaction List</strong>
                            </div>

                            <div class="col-sm-7 text-end">
                            </div>
                        </div>
                    </div>

                    <div class="card-body table-responsive">
                        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <span th:text="${errorMessage}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>

                        <table id="example" class="table table-bordered table-hover table-striped">
                            <thead class="thead-light">
                                <tr>
                                    <th>#</th>
                                    <th>Wallet Owner</th>
                                    <th>Amount</th>
                                    <th>Transaction Type</th>
                                    <th>Status</th>
                                    <th>Idempotency Key</th>
                                    <th>Created At</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="txn, status : ${list}">
                                    <th th:text="${status.count}">1</th>
                                    <td th:text="${txn.wallet != null and txn.wallet.user != null ? txn.wallet.user.firstName + (txn.wallet.user.lastName != null and !#strings.isEmpty(txn.wallet.user.lastName) ? ' ' + txn.wallet.user.lastName : '') : '-'}">Wallet Owner</td>
                                    <td th:text="${txn.amount}">0.00</td>
                                    <td th:text="${txn.type}">CREDIT</td>
                                    <td th:text="${txn.status}">SUCCESS</td>
                                    <td th:text="${txn.idempotencyKey}">WALLET</td>
                                    <td th:text="${txn.created != null ? #temporals.format(txn.created, 'dd-MM-yyyy HH:mm') : '-'}">01-01-2026 10:00</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-sm-3">
                <div class="card">
                    <div class="card-header">
                        <div class="row">
                            <div class="col-sm-5 font-weight-bold">
                                <strong><i class="fas fa-list"></i> Filter</strong>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
