<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section>
            <div class="row">
                <div class="col-sm-3"><h4> Cashback Engine </h4></div>
                <div class="col-sm-5">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="nav-link">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Promotions</li>
                            <li class="breadcrumb-item active" aria-current="page">Cashback</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </section>
        <hr/>

        <div class="card">
            <div class="card-header">
                <div class="row">
                    <div class="col-sm-6 font-weight-bold">
                        <strong><i class="bi bi-percent"></i> Cashback Policy Form</strong>
                    </div>
                    <div class="col-sm-6 text-end">
                        <a class="btn btn-secondary btn-sm" th:href="@{/cashback-policy/list}">
                            <i class="bi bi-arrow-left"></i> Back
                        </a>
                    </div>
                </div>
            </div>

            <div class="card-body">
                <form th:action="@{/cashback-policy/save}" method="post" th:object="${policy}">
                    <input type="hidden" th:field="*{id}"/>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" th:field="*{name}" required/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Percentage</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{percentage}" required/>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Max Cashback</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{maxCashback}"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Min Order Value</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{minOrderValue}"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Category Id (optional)</label>
                            <input type="number" class="form-control" th:field="*{categoryId}"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Status</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:each="s:${policyStatuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Start Date</label>
                            <input type="datetime-local" class="form-control" th:field="*{startDate}"/>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">End Date</label>
                            <input type="datetime-local" class="form-control" th:field="*{endDate}"/>
                        </div>
                    </div>

                    <div class="mt-3">
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-save"></i> Save
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
