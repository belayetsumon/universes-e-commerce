<!DOCTYPE html>
<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section>
            <div class="row">
                <div class="col-sm-3"><h4> Cashback Engine </h4></div>
                <div class="col-sm-5">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a href="#" class="nav-link">Home</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Promotions</li>
                            <li class="breadcrumb-item active" aria-current="page">Cashback</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </section>
        <hr/>

        <div class="card">
            <div class="card-header">
                <div class="row">
                    <div class="col-sm-6 font-weight-bold">
                        <strong><i class="bi bi-percent"></i> Cashback Policy List</strong>
                    </div>
                    <div class="col-sm-6 text-end">
                        <a class="btn btn-success btn-sm" th:href="@{/cashback-policy/create}">
                            <i class="bi bi-plus-circle"></i> Create Policy
                        </a>
                    </div>
                </div>
            </div>

            <div class="card-body table-responsive">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <table id="example" class="table table-bordered table-hover table-striped">
                    <thead class="thead-light">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Percentage</th>
                            <th>Max Cashback</th>
                            <th>Min Order</th>
                            <th>Start</th>
                            <th>End</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p,status:${policies}">
                            <th th:text="${status.count}">1</th>
                            <td th:text="${p.name}">Name</td>
                            <td th:text="${p.percentage}">0</td>
                            <td th:text="${p.maxCashback}">0</td>
                            <td th:text="${p.minOrderValue}">0</td>
                            <td th:text="${p.startDate}">-</td>
                            <td th:text="${p.endDate}">-</td>
                            <td th:text="${p.status}">ACTIVE</td>
                            <td>
                                <a class="btn btn-sm btn-primary" th:href="@{/cashback-policy/edit/{id}(id=${p.id})}">Edit</a>
                                <form th:action="@{/cashback-policy/delete/{id}(id=${p.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Delete this policy?')">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
