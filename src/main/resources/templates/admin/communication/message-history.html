<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <div th:replace="admin/communication/fragments :: tabs('messages')"></div>
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
            <div>
                <h3 class="mb-1">In-App Message History</h3>
                <p class="text-muted mb-0">Delivery and read tracking for internal notifications.</p>
            </div>
            <a class="btn btn-primary btn-sm" th:href="@{/admin/communication/manual/compose}">Compose</a>
        </div>
        <div class="table-responsive bg-white border rounded shadow-sm">
            <table id="tablesdata" class="table table-hover align-middle mb-0">
                <thead>
                    <tr>
                        <th>Message Subject</th>
                        <th>Channel</th>
                        <th>Message Type</th>
                        <th>Total Recipients</th>
                        <th>Read</th>
                        <th>Unread</th>
                        <th>Read %</th>
                        <th>Created Date</th>
                        <th>Status</th>
                        <th class="text-end">Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${rows == null or #lists.isEmpty(rows)}">
                        <td colspan="10" class="text-center text-muted py-4">No in-app messages found.</td>
                    </tr>
                    <tr th:each="row : ${rows}">
                        <td th:text="${row.message.subject}">Subject</td>
                        <td th:text="${row.message.channel}">IN_APP</td>
                        <td th:text="${row.message.messageType}">CUSTOM</td>
                        <td th:text="${row.report.totalRecipients}">0</td>
                        <td th:text="${row.report.readCount}">0</td>
                        <td th:text="${row.report.unreadCount}">0</td>
                        <td th:text="${#numbers.formatDecimal(row.report.readPercentage, 1, 2) + '%'}">0%</td>
                        <td th:text="${row.message.createdAt != null ? #temporals.format(row.message.createdAt, 'dd MMM yyyy HH:mm') : '-'}">-</td>
                        <td><span class="badge text-bg-light border" th:text="${row.message.status}">SENT</span></td>
                        <td class="text-end">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/communication/messages/{id}/report(id=${row.message.id})}">Report</a>
                            <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/communication/messages/{id}/recipients(id=${row.message.id})}">Recipients</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
