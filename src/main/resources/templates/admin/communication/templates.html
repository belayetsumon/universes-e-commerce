<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-3 d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-chat-left-text me-2 text-primary"></i>Message Templates</h4>
            <a class="btn btn-success btn-sm" th:href="@{/admin/communication/templates/new}"><i class="bi bi-plus-circle"></i> Add Template</a>
        </section>
        <div th:replace="admin/communication/fragments :: tabs('templates')"></div>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show"><span th:text="${errorMessage}"></span><button class="btn-close" data-bs-dismiss="alert"></button></div>
        <div class="card">
            <div class="card-body table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light"><tr><th>Event</th><th>Channel</th><th>Language</th><th>Subject</th><th>Status</th><th>Updated</th><th>Actions</th></tr></thead>
                    <tbody>
                        <tr th:each="row : ${templates}">
                            <td th:text="${row.eventType}"></td>
                            <td><span class="badge bg-info text-dark" th:text="${row.channel}"></span></td>
                            <td th:text="${row.language}"></td>
                            <td th:text="${row.subject}"></td>
                            <td><span class="badge bg-secondary" th:text="${row.status}"></span></td>
                            <td th:text="${row.updatedAt}"></td>
                            <td class="text-nowrap">
                                <a class="btn btn-sm btn-primary" th:href="@{/admin/communication/templates/{id}/edit(id=${row.id})}">Edit</a>
                                <form class="d-inline" method="post" th:action="@{/admin/communication/templates/{id}/delete(id=${row.id})}" onsubmit="return confirm('Delete this template?')">
                                    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(templates)}"><td colspan="7" class="text-center text-muted py-4">No message templates found.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
