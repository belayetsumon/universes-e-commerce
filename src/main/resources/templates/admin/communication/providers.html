<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-3 d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-hdd-network me-2 text-primary"></i>Message Providers</h4>
            <a class="btn btn-success btn-sm" th:href="@{/admin/communication/providers/new}"><i class="bi bi-plus-circle"></i> Add Provider</a>
        </section>
        <div th:replace="admin/communication/fragments :: tabs('providers')"></div>
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show"><span th:text="${successMessage}"></span><button class="btn-close" data-bs-dismiss="alert"></button></div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show"><span th:text="${errorMessage}"></span><button class="btn-close" data-bs-dismiss="alert"></button></div>
        <div class="card"><div class="card-body table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-light"><tr><th>Name</th><th>Channel</th><th>Type</th><th>Sender</th><th>Base URL</th><th>API Key</th><th>Status</th><th>Priority</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="row : ${providers}">
                        <td th:text="${row.providerName}"></td>
                        <td><span class="badge bg-info text-dark" th:text="${row.channel}"></span></td>
                        <td th:text="${row.providerType != null ? row.providerType.displayName : ''}"></td>
                        <td th:text="${row.senderId}"></td>
                        <td class="text-break" th:text="${row.baseUrl}"></td>
                        <td th:text="${row.maskedApiKey}"></td>
                        <td><span class="badge bg-secondary" th:text="${row.status}"></span></td>
                        <td th:text="${row.priority}"></td>
                        <td class="text-nowrap">
                            <a class="btn btn-sm btn-primary" th:href="@{/admin/communication/providers/{id}/edit(id=${row.id})}">Edit</a>
                            <form class="d-inline" method="post" th:action="@{/admin/communication/providers/{id}/delete(id=${row.id})}" onsubmit="return confirm('Delete this provider?')">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button class="btn btn-sm btn-danger" type="submit">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(providers)}"><td colspan="9" class="text-center text-muted py-4">No message providers found.</td></tr>
                </tbody>
            </table>
        </div></div>
    </div>
</div>
