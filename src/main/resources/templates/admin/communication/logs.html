<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-3"><h4 class="mb-0"><i class="bi bi-journal-text me-2 text-primary"></i>Message Logs</h4></section>
        <div th:replace="admin/communication/fragments :: tabs('logs')"></div>
        <div class="card"><div class="card-body table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-light"><tr><th>ID</th><th>Event</th><th>Type</th><th>Channel</th><th>Recipient</th><th>Provider</th><th>Template</th><th>Status</th><th>Code</th><th>Response</th><th>Sent</th></tr></thead>
                <tbody>
                    <tr th:each="row : ${logs}">
                        <td th:text="${row.id}"></td><td th:text="${row.eventType}"></td><td th:text="${row.messageType}"></td><td th:text="${row.channel}"></td><td class="text-break" th:text="${row.recipient}"></td>
                        <td th:text="${row.provider != null ? row.provider.providerName : 'None'}"></td>
                        <td th:text="${row.templateId != null ? row.templateId + ' / v' + row.templateVersion : 'Fallback'}"></td>
                        <td><span class="badge bg-secondary" th:text="${row.status}"></span></td>
                        <td th:text="${row.responseCode}"></td><td class="text-break" th:text="${row.responseMessage}"></td><td th:text="${row.sentAt}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(logs)}"><td colspan="11" class="text-center text-muted py-4">No message logs found.</td></tr>
                </tbody>
            </table>
        </div></div>
    </div>
</div>
