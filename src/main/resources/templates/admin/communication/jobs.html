<div xmlns:th="http://www.thymeleaf.org" layout:decorate="admin-layout">
    <div layout:fragment="main_content">
        <section class="mb-3"><h4 class="mb-0"><i class="bi bi-list-check me-2 text-primary"></i>Message Jobs</h4></section>
        <div th:replace="admin/communication/fragments :: tabs('jobs')"></div>
        <div class="card"><div class="card-body table-responsive">
            <table class="table table-bordered table-hover align-middle mb-0">
                <thead class="table-light"><tr><th>ID</th><th>Event</th><th>Type</th><th>Channel</th><th>Recipient</th><th>Status</th><th>Retry</th><th>Template</th><th>Idempotency</th><th>Scheduled</th><th>Sent</th><th>Failure</th></tr></thead>
                <tbody>
                    <tr th:each="row : ${jobs}">
                        <td th:text="${row.id}"></td><td th:text="${row.eventType}"></td><td th:text="${row.messageType}"></td><td th:text="${row.channel}"></td><td class="text-break" th:text="${row.recipient}"></td>
                        <td><span class="badge bg-secondary" th:text="${row.status}"></span></td><td th:text="${row.retryCount}"></td>
                        <td th:text="${row.templateId != null ? row.templateId + ' / v' + row.templateVersion : 'Fallback'}"></td>
                        <td class="text-break small" th:text="${row.idempotencyKey}"></td><td th:text="${row.scheduledAt}"></td><td th:text="${row.sentAt}"></td><td class="text-break" th:text="${row.failedReason}"></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(jobs)}"><td colspan="12" class="text-center text-muted py-4">No message jobs found.</td></tr>
                </tbody>
            </table>
        </div></div>
    </div>
</div>
