<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-page">
    <div layout:fragment="main_content">
        <div class="blog-progress" id="blogReadingProgress"></div>
        <article class="blog-article-shell">
            <div class="container py-4 py-lg-5">
                <nav aria-label="breadcrumb"><ol class="breadcrumb mb-3"><li class="breadcrumb-item"><a th:href="@{/}">Home</a></li><li class="breadcrumb-item"><a th:href="@{/public/blog}">Blog</a></li><li class="breadcrumb-item active" th:text="${blog.title}">Article</li></ol></nav>
                <header class="blog-article-head">
                    <div class="blog-article-meta">
                        <a th:if="${blog.category != null}" th:href="@{/public/blog/category/{slug}(slug=${blog.category.slug})}" th:text="${blog.category.name}">Category</a>
                        <span th:text="${blog.readingTimeMinutes + ' min read'}">3 min read</span>
                        <span th:if="${blog.author != null}" th:text="${blog.author.displayName}">Author</span>
                    </div>
                    <h1 th:text="${blog.title}">Article title</h1>
                    <p class="lead text-muted" th:text="${blog.excerpt}">Excerpt</p>
                    <img th:if="${blog.featuredImageUrl != null}" class="blog-hero-image" th:src="${blog.featuredImageUrl}" th:alt="${blog.featuredImageAlt != null ? blog.featuredImageAlt : blog.title}" loading="lazy">
                </header>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="blog-content" th:utext="${blog.contentHtml}"></div>

                        <section class="blog-faqs mt-4" th:if="${!#lists.isEmpty(faqs)}">
                            <h2 class="h5">Questions</h2>
                            <div class="accordion" id="blogFaqs">
                                <div class="accordion-item" th:each="faq, stat : ${faqs}">
                                    <h3 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" th:data-bs-target="'#faq' + ${stat.index}" th:text="${faq.question}">Question</button></h3>
                                    <div class="accordion-collapse collapse" th:id="'faq' + ${stat.index}" data-bs-parent="#blogFaqs"><div class="accordion-body" th:text="${faq.answer}">Answer</div></div>
                                </div>
                            </div>
                        </section>

                        <section class="blog-comments mt-4">
                            <h2 class="h5">Comments</h2>
                            <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
                            <div class="blog-comment" th:each="comment : ${comments}">
                                <strong th:text="${comment.guestName}">Name</strong>
                                <p th:text="${comment.commentText}">Comment</p>
                            </div>
                            <form class="blog-comment-form" method="post" th:action="@{/public/blog/{slug}/comments(slug=${blog.slug})}" th:object="${commentForm}" th:if="${blog.allowComments}">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div class="row g-2">
                                    <div class="col-md-6"><input class="form-control" th:field="*{name}" placeholder="Name"><div class="text-danger small" th:errors="*{name}"></div></div>
                                    <div class="col-md-6"><input class="form-control" th:field="*{email}" placeholder="Email"><div class="text-danger small" th:errors="*{email}"></div></div>
                                    <div class="col-12"><textarea class="form-control" rows="4" th:field="*{comment}" placeholder="Comment"></textarea><div class="text-danger small" th:errors="*{comment}"></div></div>
                                    <div class="col-12"><button class="btn btn-danger">Submit Comment</button></div>
                                </div>
                            </form>
                        </section>
                    </div>

                    <aside class="col-lg-4">
                        <div class="blog-side-panel mb-3">
                            <h2 class="h6">Share</h2>
                            <div class="d-flex flex-wrap gap-2">
                                <a class="btn btn-sm btn-outline-primary" target="_blank" th:href="@{'https://www.facebook.com/sharer/sharer.php?u=/public/blog/' + ${blog.slug}}">Facebook</a>
                                <a class="btn btn-sm btn-outline-info" target="_blank" th:href="@{'https://twitter.com/intent/tweet?url=/public/blog/' + ${blog.slug} + '&text=' + ${blog.title}}">Twitter</a>
                                <button class="btn btn-sm btn-outline-secondary" type="button" onclick="navigator.clipboard && navigator.clipboard.writeText(window.location.href)">Copy Link</button>
                            </div>
                        </div>
                        <div class="blog-side-panel mb-3" th:if="${!#lists.isEmpty(relatedProducts)}">
                            <h2 class="h6">Related Products</h2>
                            <a class="blog-product-link" th:each="item : ${relatedProducts}" th:href="@{/public/single-product/{prodid}(prodid=${item.product.uuid})}">
                                <span th:text="${item.product.title}">Product</span>
                                <small th:text="${item.ctaLabel}">View Product</small>
                            </a>
                        </div>
                        <div class="blog-side-panel">
                            <h2 class="h6">Related Articles</h2>
                            <a class="blog-mini-link" th:each="article : ${relatedArticles}" th:if="${article.id != blog.id}" th:href="@{/public/blog/{slug}(slug=${article.slug})}" th:text="${article.title}">Article</a>
                        </div>
                    </aside>
                </div>
            </div>
        </article>
    </div>
    <th:block layout:fragment="page_css">
        <style>
            .blog-progress{position:fixed;top:0;left:0;height:4px;background:#dc3545;width:0;z-index:1055}
            .blog-article-shell{background:#f7f9fc}
            .blog-article-head{max-width:880px;margin:0 auto 2rem}
            .blog-article-head h1{font-size:clamp(2rem,4vw,3.5rem);line-height:1.08}
            .blog-article-meta{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:.75rem;color:#64748b}
            .blog-hero-image{width:100%;border-radius:8px;max-height:480px;object-fit:cover;margin-top:1rem}
            .blog-content,.blog-side-panel,.blog-comments,.blog-faqs{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:1.25rem}
            .blog-content img{max-width:100%;height:auto}
            .blog-comment{border-top:1px solid #edf0f4;padding:.9rem 0}
            .blog-mini-link,.blog-product-link{display:block;text-decoration:none;color:#172033;padding:.65rem 0;border-top:1px solid #edf0f4}
            .blog-product-link small{display:block;color:#dc3545}
        </style>
    </th:block>
    <th:block layout:fragment="page_js">
        <script>
            window.addEventListener('scroll', function () {
                var doc = document.documentElement;
                var max = doc.scrollHeight - doc.clientHeight;
                var pct = max > 0 ? (doc.scrollTop / max) * 100 : 0;
                var bar = document.getElementById('blogReadingProgress');
                if (bar) { bar.style.width = pct + '%'; }
            }, { passive: true });
        </script>
    </th:block>
</div>
