<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-page">
    <div layout:fragment="main_content">
        <div class="blog-progress" id="blogReadingProgress"></div>
        <article class="public-blog-article-page">
            <header class="public-blog-article-hero">
                <div class="container">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb public-blog-breadcrumb mb-3">
                            <li class="breadcrumb-item"><a th:href="@{/}">Home</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/public/blog}">Blog</a></li>
                            <li class="breadcrumb-item active" th:text="${blog.title}">Article</li>
                        </ol>
                    </nav>
                    <div class="public-blog-article-head">
                        <div class="public-blog-article-meta">
                            <a th:if="${blog.category != null}" th:href="@{/public/blog/category/{slug}(slug=${blog.category.slug})}" th:text="${blog.category.name}">Category</a>
                            <span><i class="bi bi-clock"></i> <span th:text="${blog.readingTimeMinutes + ' min read'}">3 min read</span></span>
                            <span th:if="${blog.createdBy != null}"><i class="bi bi-person"></i> <span th:text="${blog.createdBy}">Creator</span></span>
                        </div>
                        <h1 th:text="${blog.title}">Article title</h1>
                        <p th:text="${blog.excerpt}">Excerpt</p>
                    </div>
                </div>
            </header>

            <div class="container public-blog-article-container">
                <img th:if="${blog.featuredImageUrl != null}" class="public-blog-hero-image" th:src="${blog.featuredImageUrl}" th:alt="${blog.featuredImageAlt != null ? blog.featuredImageAlt : blog.title}" loading="lazy">

                <div class="public-blog-article-layout">
                    <main class="public-blog-article-main">
                        <div class="public-blog-article-card">
                            <div class="blog-content" th:utext="${blog.contentHtml}"></div>
                        </div>

                        <section class="public-blog-section" th:if="${!#lists.isEmpty(faqs)}">
                            <div class="public-blog-section-head">
                                <i class="bi bi-question-circle"></i>
                                <h2>Questions</h2>
                            </div>
                            <div class="accordion public-blog-faqs" id="blogFaqs">
                                <div class="accordion-item" th:each="faq, stat : ${faqs}">
                                    <h3 class="accordion-header">
                                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" th:data-bs-target="'#faq' + ${stat.index}" th:text="${faq.question}">Question</button>
                                    </h3>
                                    <div class="accordion-collapse collapse" th:id="'faq' + ${stat.index}" data-bs-parent="#blogFaqs">
                                        <div class="accordion-body" th:text="${faq.answer}">Answer</div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section class="public-blog-section">
                            <div class="public-blog-section-head">
                                <i class="bi bi-chat-left-text"></i>
                                <h2>Comments</h2>
                            </div>
                            <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
                            <div class="public-blog-comment" th:each="comment : ${comments}">
                                <strong th:text="${comment.guestName}">Name</strong>
                                <p th:text="${comment.commentText}">Comment</p>
                            </div>
                            <div class="public-blog-empty public-blog-empty-compact" th:if="${#lists.isEmpty(comments)}">
                                <i class="bi bi-chat-square-dots"></i>
                                <p>No public comments yet.</p>
                            </div>
                            <form class="public-blog-comment-form" method="post" th:action="@{/public/blog/{slug}/comments(slug=${blog.slug})}" th:object="${commentForm}" th:if="${blog.allowComments and previewMode != true}">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="visually-hidden" for="blogCommentName">Name</label>
                                        <input id="blogCommentName" class="form-control" th:field="*{name}" placeholder="Name">
                                        <div class="text-danger small" th:errors="*{name}"></div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="visually-hidden" for="blogCommentEmail">Email</label>
                                        <input id="blogCommentEmail" class="form-control" th:field="*{email}" placeholder="Email">
                                        <div class="text-danger small" th:errors="*{email}"></div>
                                    </div>
                                    <div class="col-12">
                                        <label class="visually-hidden" for="blogCommentText">Comment</label>
                                        <textarea id="blogCommentText" class="form-control" rows="4" th:field="*{comment}" placeholder="Comment"></textarea>
                                        <div class="text-danger small" th:errors="*{comment}"></div>
                                    </div>
                                    <div class="col-12">
                                        <button class="btn public-blog-action">Submit Comment</button>
                                    </div>
                                </div>
                            </form>
                        </section>
                    </main>

                    <aside class="public-blog-article-sidebar">
                        <section class="public-blog-panel public-blog-share-panel">
                            <div class="public-blog-panel-head">
                                <i class="bi bi-share"></i>
                                <h2>Share Article</h2>
                            </div>
                            <div class="public-blog-share-actions">
                                <a target="_blank" th:href="@{'https://www.facebook.com/sharer/sharer.php?u=/public/blog/' + ${blog.slug}}"><i class="bi bi-facebook"></i> Facebook</a>
                                <a target="_blank" th:href="@{'https://twitter.com/intent/tweet?url=/public/blog/' + ${blog.slug} + '&text=' + ${blog.title}}"><i class="bi bi-twitter-x"></i> Twitter</a>
                                <button type="button" onclick="navigator.clipboard && navigator.clipboard.writeText(window.location.href)"><i class="bi bi-link-45deg"></i> Copy Link</button>
                            </div>
                        </section>

                        <section class="public-blog-panel" th:if="${!#lists.isEmpty(relatedProducts)}">
                            <div class="public-blog-panel-head">
                                <i class="bi bi-bag-check"></i>
                                <h2>Related Products</h2>
                            </div>
                            <a class="public-blog-product-link" th:each="item : ${relatedProducts}" th:href="@{/public/single-product/{prodid}(prodid=${item.product.uuid})}">
                                <span th:text="${item.product.title}">Product</span>
                                <small th:text="${item.ctaLabel}">View Product</small>
                            </a>
                        </section>

                        <section class="public-blog-panel">
                            <div class="public-blog-panel-head">
                                <i class="bi bi-journals"></i>
                                <h2>Related Articles</h2>
                            </div>
                            <a class="public-blog-mini-link" th:each="article : ${relatedArticles}" th:if="${article.id != blog.id}" th:href="@{/public/blog/{slug}(slug=${article.slug})}">
                                <span th:text="${article.title}">Article</span>
                                <small th:text="${article.readingTimeMinutes + ' min read'}">3 min read</small>
                            </a>
                        </section>
                    </aside>
                </div>
            </div>
        </article>
    </div>
    <th:block layout:fragment="page_js">
        <script>
            window.addEventListener('scroll', function () {
                var doc = document.documentElement;
                var max = doc.scrollHeight - doc.clientHeight;
                var pct = max > 0 ? (doc.scrollTop / max) * 100 : 0;
                var bar = document.getElementById('blogReadingProgress');
                if (bar) { bar.style.width = pct + '%'; }
            }, { passive: true });
        </script>
    </th:block>
</div>
