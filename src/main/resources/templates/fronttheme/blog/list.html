<div xmlns:th="http://www.thymeleaf.org" layout:decorate="front-layout-inner-page">
    <div layout:fragment="main_content">
        <section class="blog-public-shell">
            <div class="container py-4 py-lg-5">
                <div th:if="${successMessage}" class="alert alert-success"><span th:text="${successMessage}"></span></div>
                <div th:if="${errorMessage}" class="alert alert-danger"><span th:text="${errorMessage}"></span></div>

                <div class="blog-landing-head mb-4">
                    <div>
                        <nav aria-label="breadcrumb"><ol class="breadcrumb mb-2"><li class="breadcrumb-item"><a th:href="@{/}">Home</a></li><li class="breadcrumb-item active">Blog</li></ol></nav>
                        <h1 class="mb-2">Shopping Guides & Stories</h1>
                        <p class="text-muted mb-0">Ideas, product education, buying guides, and marketplace updates.</p>
                    </div>
                    <form class="blog-search" method="get" th:action="@{/public/blog/search}">
                        <input class="form-control" name="q" th:value="${query}" placeholder="Search articles">
                        <button class="btn btn-danger" type="submit"><i class="bi bi-search"></i></button>
                    </form>
                </div>

                <div class="row g-4">
                    <div class="col-lg-8">
                        <div class="row g-3">
                            <div class="col-md-6" th:each="article : ${articles.content}">
                                <article class="blog-card h-100">
                                    <a th:href="@{/public/blog/{slug}(slug=${article.slug})}" class="blog-card-media">
                                        <img th:if="${article.featuredImageUrl != null}" th:src="${article.featuredImageUrl}" th:alt="${article.featuredImageAlt != null ? article.featuredImageAlt : article.title}" loading="lazy">
                                        <span th:unless="${article.featuredImageUrl != null}" class="blog-card-placeholder"><i class="bi bi-journal-richtext"></i></span>
                                    </a>
                                    <div class="blog-card-body">
                                        <div class="d-flex justify-content-between gap-2 small text-muted mb-2">
                                            <a class="text-decoration-none" th:if="${article.category != null}" th:href="@{/public/blog/category/{slug}(slug=${article.category.slug})}" th:text="${article.category.name}">Category</a>
                                            <span th:text="${article.readingTimeMinutes + ' min read'}">3 min read</span>
                                        </div>
                                        <h2 class="h5"><a th:href="@{/public/blog/{slug}(slug=${article.slug})}" th:text="${article.title}">Article title</a></h2>
                                        <p class="text-muted" th:text="${article.excerpt}">Excerpt</p>
                                    </div>
                                </article>
                            </div>
                            <div class="col-12" th:if="${articles.empty}">
                                <div class="text-center text-muted py-5 bg-white border rounded">No articles found.</div>
                            </div>
                        </div>
                    </div>
                    <aside class="col-lg-4">
                        <div class="blog-sidebar-block mb-3">
                            <h2 class="h6">Categories</h2>
                            <div class="d-flex flex-wrap gap-2">
                                <a class="btn btn-sm btn-outline-secondary" th:each="category : ${blogCategories}" th:href="@{/public/blog/category/{slug}(slug=${category.slug})}" th:text="${category.name}">Category</a>
                            </div>
                        </div>
                        <div class="blog-sidebar-block mb-3">
                            <h2 class="h6">Popular Articles</h2>
                            <a class="blog-mini-link" th:each="article : ${popularArticles}" th:href="@{/public/blog/{slug}(slug=${article.slug})}" th:text="${article.title}">Article</a>
                        </div>
                        <div class="blog-sidebar-block">
                            <h2 class="h6">Newsletter</h2>
                            <form method="post" th:action="@{/public/blog/subscribe}" th:object="${subscriberForm}">
                                <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input class="form-control mb-2" th:field="*{name}" placeholder="Name">
                                <input class="form-control mb-2" th:field="*{email}" placeholder="Email">
                                <button class="btn btn-danger w-100">Subscribe</button>
                            </form>
                        </div>
                    </aside>
                </div>
            </div>
        </section>
    </div>
    <th:block layout:fragment="page_css">
        <style>
            .blog-public-shell{background:#f6f8fb}
            .blog-landing-head{display:flex;gap:1rem;justify-content:space-between;align-items:end}
            .blog-search{display:flex;gap:.5rem;min-width:min(420px,100%)}
            .blog-card,.blog-sidebar-block{background:#fff;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden}
            .blog-card-media{display:flex;align-items:center;justify-content:center;aspect-ratio:16/9;background:#e8eef6;color:#113459;text-decoration:none}
            .blog-card-media img{width:100%;height:100%;object-fit:cover}
            .blog-card-placeholder{font-size:2.5rem}
            .blog-card-body{padding:1rem}
            .blog-card h2 a{color:#172033;text-decoration:none}
            .blog-sidebar-block{padding:1rem}
            .blog-mini-link{display:block;color:#172033;text-decoration:none;padding:.55rem 0;border-top:1px solid #edf0f4}
            @media (max-width: 768px){.blog-landing-head{display:block}.blog-search{margin-top:1rem}}
        </style>
    </th:block>
</div>
