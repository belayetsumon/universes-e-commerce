<div xmlns:th="http://www.thymeleaf.org"
     th:fragment="share"
     class="social-share"
     th:if="${marketingSettings != null and marketingSettings.socialSharingEnabled}"
     th:with="shareHref=${shareUrl != null ? shareUrl : (pageShareUrl != null ? pageShareUrl : (pageCanonicalUrl != null ? pageCanonicalUrl : defaultCanonicalUrl))},
              shareTitle=${shareTitle != null ? shareTitle : (pageTitle != null ? pageTitle : (defaultPageTitle != null ? defaultPageTitle : ''))},
              shareDescription=${shareDescription != null ? shareDescription : (pageDescription != null ? pageDescription : (defaultPageDescription != null ? defaultPageDescription : ''))},
              pageTypeValue=${sharePageType != null ? sharePageType : 'PAGE'},
              entityRef=${shareEntityReference != null ? shareEntityReference : ''}">
    <div class="social-share__label">Share</div>
    <div class="social-share__actions" th:if="${shareHref != null}">
        <a th:if="${marketingSettings.facebookSharingEnabled}" class="social-share__btn" data-share-platform="FACEBOOK" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" th:href="${'https://www.facebook.com/sharer/sharer.php?u=' + #uris.escapeQueryParam(shareHref)}" target="_blank" rel="noopener noreferrer" aria-label="Share on Facebook" title="Share on Facebook"><i class="bi bi-facebook"></i></a>
        <a th:if="${marketingSettings.messengerSharingEnabled}" class="social-share__btn" data-share-platform="MESSENGER" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" th:href="${'https://www.facebook.com/dialog/send?link=' + #uris.escapeQueryParam(shareHref)}" target="_blank" rel="noopener noreferrer" aria-label="Share on Messenger" title="Share on Messenger"><i class="bi bi-chat-dots"></i></a>
        <a th:if="${marketingSettings.whatsappSharingEnabled}" class="social-share__btn" data-share-platform="WHATSAPP" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" th:href="${'https://wa.me/?text=' + #uris.escapeQueryParam((shareTitle != null ? shareTitle + ' ' : '') + shareHref)}" target="_blank" rel="noopener noreferrer" aria-label="Share on WhatsApp" title="Share on WhatsApp"><i class="bi bi-whatsapp"></i></a>
        <a th:if="${marketingSettings.linkedinSharingEnabled}" class="social-share__btn" data-share-platform="LINKEDIN" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" th:href="${'https://www.linkedin.com/sharing/share-offsite/?url=' + #uris.escapeQueryParam(shareHref)}" target="_blank" rel="noopener noreferrer" aria-label="Share on LinkedIn" title="Share on LinkedIn"><i class="bi bi-linkedin"></i></a>
        <a th:if="${marketingSettings.twitterSharingEnabled}" class="social-share__btn" data-share-platform="X" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" th:href="${'https://twitter.com/intent/tweet?url=' + #uris.escapeQueryParam(shareHref) + '&text=' + #uris.escapeQueryParam(shareTitle)}" target="_blank" rel="noopener noreferrer" aria-label="Share on X" title="Share on X"><i class="bi bi-twitter-x"></i></a>
        <a th:if="${marketingSettings.emailSharingEnabled}" class="social-share__btn" data-share-platform="EMAIL" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" th:href="${'mailto:?subject=' + #uris.escapeQueryParam(shareTitle) + '&body=' + #uris.escapeQueryParam((shareDescription != null ? shareDescription + '\n\n' : '') + shareHref)}" aria-label="Share by email" title="Share by email"><i class="bi bi-envelope"></i></a>
        <button th:if="${marketingSettings.copyLinkSharingEnabled}" type="button" class="social-share__btn" data-share-platform="COPY_LINK" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" aria-label="Copy share link" title="Copy link"><i class="bi bi-link-45deg"></i></button>
        <button th:if="${marketingSettings.nativeShareEnabled}" type="button" class="social-share__btn social-share__native" data-share-platform="NATIVE_SHARE" th:attr="data-share-url=${shareHref},data-share-title=${shareTitle},data-share-description=${shareDescription},data-share-page-type=${pageTypeValue},data-share-entity=${entityRef}" aria-label="Share from this device" title="Device share"><i class="bi bi-share"></i></button>
    </div>
    <span class="social-share__feedback" role="status" aria-live="polite"></span>
</div>
