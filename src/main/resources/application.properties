server.servlet.context-path=/
#spring.profiles.active=local
#spring.profiles.active=postgersql
#spring.profiles.active=live
spring.profiles.active=remot

#thymeleaf

spring.thymeleaf.cache: false

# Allow larger multipart file uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.file-size-threshold=2MB

# Vendor logo policy. Images are converted to WebP after server-side validation.
app.upload.vendor-logo.max-file-size-bytes=2097152
app.upload.vendor-logo.max-width=5000
app.upload.vendor-logo.max-height=5000

#image Path

#app.upload.dir=${user.home}/universesecommerce/





#for shopping cart
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# SMPP Propertis

# SMS gateway defaults. Override these in the active profile when real SMS is enabled.
sms.api.url=
sms.api.key=


spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=dummy@example.com
spring.mail.password=dummy
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#logging.level.root=INFO
#logging.level.your.package.name=DEBUG



# JPA / Hibernate
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true
#
#spring.jpa.properties.hibernate.default_batch_fetch_size=25

# Detailed SQL logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=INFO
logging.level.org.springframework.transaction=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.orm.jpa=DEBUG

# Framework logs
logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR

logging.file.name=/var/log/musapir/application.log

logging.level.org.springframework.web=DEBUG

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=true
logging.level.org.thymeleaf=DEBUG
logging.level.com.ecommerce.app.module.settings=INFO





